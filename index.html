<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
  background: #f4f4f5;
  color: #111;
  padding: 50px;
}
.container { max-width: 1100px; margin: auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 24px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 95px; }

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.08);
  background: #fff;
  color: #111;
  margin: 6px;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #fff;
  cursor: pointer;
}
button:hover { background: #333; }

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #666;
  margin-bottom: 14px;
  text-transform: uppercase;
}

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 14px;
}

.data-item {
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.05);
}

.data-label { font-size: 12px; color: #777; }
.data-value { font-size: 18px; font-weight: 600; margin-top: 6px; }

#weeklyRange {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">
<input type="file" id="fileInput" accept=".csv"><br>

<input type="text" id="name" placeholder="Client Name">
<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<div id="weeklyRange" style="display:none;">
Start: <input type="date" id="weekStart">
End: <input type="date" id="weekEnd">
</div>

<br><br>

<button onclick="run('weekly')">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="copyNote()">Copy to GHL Note</button>
</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";

// ===== PARSE =====
function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");

  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function loadFile(cb){
  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Upload CSV");

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    cb();
  };
  reader.readAsText(file);
}

// ===== CALCS =====
function getClosed(start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type==="Closed position" && d>=start && d<=end;
  }).reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getDeposits(start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type==="Deposit" && d>=start && d<=end;
  }).reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getWithdrawals(start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type==="Withdrawal" && d>=start && d<=end;
  }).reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getFloating(){
  return rows.filter(r=>r.Type==="Open position")
    .reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getFirstClose(onboard){
  let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard);
  if(!trades.length) return null;
  trades.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]));
  return trades[0];
}

// ===== MAIN =====
function run(type){

loadFile(()=>{

const name=document.getElementById("name").value||"Client";
const software=document.getElementById("software").value||"N/A";

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return alert("No closed trades found");

let firstDate=new Date(first["Close date"]);
let today=new Date();

let closedTotal=getClosed(onboard,today);
let deposits=getDeposits(new Date("2000-01-01"),today);
let withdrawals=getWithdrawals(new Date("2000-01-01"),today);

let balance=deposits + closedTotal - withdrawals;
let floating=getFloating();

let initialDeposit=getDeposits(new Date("2000-01-01"),onboard);
let growthVal=balance-initialDeposit;
let growthPct=initialDeposit?(growthVal/initialDeposit)*100:0;

let track=Math.floor((today-firstDate)/(1000*60*60*24));

document.getElementById("overview").innerHTML=`
<div class="section-title">Account Details</div>
<div class="data-grid">
<div class="data-item"><div class="data-label">Balance</div><div class="data-value">${balance.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closedTotal.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Floating P/L</div><div class="data-value">${floating.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthPct.toFixed(2)}% (${growthVal.toFixed(2)})</div></div>
<div class="data-item"><div class="data-label">Track Record</div><div class="data-value">${track} days</div></div>
<div class="data-item"><div class="data-label">1st Trade Closed</div><div class="data-value">${firstDate.toLocaleDateString()}</div></div>
</div>
`;

// ===== BREAKDOWN =====
let start,end,title="";

if(type==="weekly"){
document.getElementById("weeklyRange").style.display="block";
start=new Date(document.getElementById("weekStart").value);
end=new Date(document.getElementById("weekEnd").value);
title=`Weekly (${start.toLocaleDateString()} - ${end.toLocaleDateString()})`;
}
else{
document.getElementById("weeklyRange").style.display="none";
let days=Number(type);
start=firstDate;
end=new Date(firstDate);
end.setDate(end.getDate()+days);
title=`${days} Days`;
}

let closed=getClosed(start,end);
let dep=getDeposits(start,end);
let wd=getWithdrawals(start,end);
let bal=dep + closed - wd;
let growthTF=initialDeposit?((bal-initialDeposit)/initialDeposit)*100:0;

document.getElementById("breakdown").innerHTML=`
<div class="section-title">Account Performance (${title})</div>
<div class="data-grid">
<div class="data-item"><div class="data-label">Balance</div><div class="data-value">${bal.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closed.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Floating P/L</div><div class="data-value">${floating.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthTF.toFixed(2)}%</div></div>
</div>
`;

// ===== GHL TEXT =====
ghlText = `
Client: ${name}
Software: ${software}

--- ACCOUNT DETAILS ---
Balance: ${balance.toFixed(2)}
Closed Profits: ${closedTotal.toFixed(2)}
Floating P/L: ${floating.toFixed(2)}
Growth: ${growthPct.toFixed(2)}% (${growthVal.toFixed(2)})
Track Record: ${track} days
1st Trade Closed: ${firstDate.toLocaleDateString()}

--- PERFORMANCE (${title}) ---
Balance: ${bal.toFixed(2)}
Closed Profits: ${closed.toFixed(2)}
Floating P/L: ${floating.toFixed(2)}
Growth: ${growthTF.toFixed(2)}%
`;

});

}

function copyNote(){
  if(!ghlText) return alert("Run analysis first");
  navigator.clipboard.writeText(ghlText);
  alert("Copied to clipboard!");
}

</script>

</body>
</html>
