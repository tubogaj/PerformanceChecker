<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body { font-family:-apple-system,'Segoe UI'; background:#f4f4f5; padding:50px; color:#111; }
.container { max-width:1100px;margin:auto; }
.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}
input, select { padding:10px;border-radius:8px;border:1px solid #ddd;margin:5px; }
button { padding:10px 16px;border:none;border-radius:8px;background:#111;color:#fff;cursor:pointer; }
button:hover { background:#333; }

.data-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px; }
.data-item { background:#fff;padding:15px;border-radius:10px;border:1px solid #eee; }
.section-title { font-size:13px;color:#666;margin-bottom:10px;text-transform:uppercase; }
.note { font-size:12px;color:#777;margin-top:10px; }
h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass"><h2>Account Performance Checker</h2></div>

<div class="glass">

<input type="file" id="fileInput"><br>

<select id="software">
<option value="">Select System</option>
<option>R2</option>
<option>R2.5</option>
<option>R10</option>
<option>R50</option>
<option>R400</option>
<option>RX25</option>
<option>RC30</option>
<option>RX5</option>
<option>RS15</option>
<option>RA10</option>
</select>

<input type="date" id="onboarding">

<div id="weeklyBox" style="display:none">
<input type="date" id="weekStart">
<input type="date" id="weekEnd">
<button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="runDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";
let lastStats={};

const fmt = v => Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

function calcDaysInclusive(start,end){
  const s=new Date(start); s.setHours(0,0,0,0);
  const e=new Date(end); e.setHours(0,0,0,0);
  return Math.floor((e-s)/(1000*60*60*24))+1;
}

document.getElementById("fileInput").addEventListener("change",init);
document.getElementById("onboarding").addEventListener("change",init);

function init(){
const file=document.getElementById("fileInput").files[0];
const onboard=document.getElementById("onboarding").value;
if(!file||!onboard) return;

const reader=new FileReader();
reader.onload=e=>{
rows=parseCSV(e.target.result);
renderAccount();
};
reader.readAsText(file);
}

function parseCSV(text){
const lines=text.split("\n").filter(l=>l.trim());
const headers=lines[1].split(",");
return lines.slice(2).map(l=>{
const v=l.split(",");
let o={};
headers.forEach((h,i)=>o[h.trim()]=v[i]?.trim());
return o;
});
}

function sum(a){return a.reduce((s,v)=>s+v,0);}
function get(c){return rows.filter(c).map(r=>Number(r["Net profit"])||0);}

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(d){
let dep=sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d));
let wd=sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d));
let cl=sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
return dep-wd+cl;
}

function analyzePeriod(start,end){
let trades=rows.filter(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end);

let profits=trades.map(r=>Number(r["Net profit"])||0);
let total=sum(profits);

let startBal=getBalanceAt(start);
let endBal=getBalanceAt(end);
let growth=startBal?(total/startBal)*100:0;

return {trades,total,startBal,endBal,growth};
}

// ===== SYSTEM CONTEXT =====
function systemContext(system){
if(system==="R2") return "This system operates using a grid-based structure where positions are layered as price moves, making drawdown a natural part of its execution before recovery occurs.";
if(system==="R2.5") return "This system follows a grid-based structure with increased lot sizing, resulting in amplified exposure where both growth and drawdown cycles occur more rapidly.";
if(["R10","R50","R400"].includes(system)) return "This system operates as a multi-strategy AI allocator, distributing exposure across multiple currency pairs and strategies based on changing market conditions.";
if(system==="RX25") return "This system dynamically rotates across multiple subsystems, including selective gold exposure, adapting to shifts in volatility and market structure.";
if(system==="RX5") return "This system follows a similar adaptive multi-strategy approach with moderated exposure, prioritizing capital stability and controlled growth.";
if(system==="RC30") return "This system operates within the cryptocurrency market, adapting to high-volatility conditions across BTC and ETH cycles.";
if(system==="RS15") return "This system is an intraday, event-driven strategy that selectively trades during high-impact news releases, resulting in irregular but precise execution.";
if(system==="RA10") return "This system focuses on reversal-based execution, identifying high-probability turning points rather than continuously trading market trends.";
return "";
}

// ===== NARRATIVE =====
function generateNarrative(start,end,type){

let d = analyzePeriod(start,end);
let system=document.getElementById("software").value;

let tone = d.total>=0
? "The system delivered a positive performance during this period."
: "The system closed this period at a net loss.";

if(type==="30"){
return `<div class="data-item">
${tone}

During the first 30 days, the system executed ${d.trades.length} trades, producing a closed result of $${fmt(d.total)} and reaching a balance of $${fmt(d.endBal)}, representing ${d.growth.toFixed(2)}% growth.

${systemContext(system)}

This initial phase reflects how the system behaves under live market conditions, where exposure is being established and fluctuations, including drawdown and recovery, are expected as part of normal operation.

Performance remains dependent on prevailing market conditions, and short-term variability should be expected during this stage.
</div>`;
}

if(type==="60"){

let mid=new Date(start); mid.setDate(mid.getDate()+29);
let first30=analyzePeriod(start,mid);
let next30=analyzePeriod(mid,end);

return `<div class="data-item">
${tone}

Over the first 30 days, the account generated $${fmt(first30.total)}. In the following 30-day period, the system produced $${fmt(next30.total)}, highlighting how performance evolved beyond the initial phase.

The account now stands at $${fmt(d.endBal)}, with an overall result of $${fmt(d.total)}, equivalent to ${d.growth.toFixed(2)}%.

${systemContext(system)}

This comparison illustrates how the system transitioned from early-stage behavior into a more developed execution phase, where patterns of recovery, stability, or continued fluctuation become clearer.

Performance continues to depend on market conditions, and both positive and negative cycles remain part of normal system behavior.
</div>`;
}

if(type==="90"){
return `<div class="data-item">
${tone}

Over the 90-day period, the system executed ${d.trades.length} trades, generating a total result of $${fmt(d.total)} and reaching a balance of $${fmt(d.endBal)}, representing ${d.growth.toFixed(2)}% growth.

${systemContext(system)}

This extended duration provides a more complete view of the system’s behavior across multiple market conditions, including periods of favorable movement, consolidation, and drawdown.

The performance observed reflects how the system operates over time, where initial fluctuations transition into more structured execution patterns and potential recovery phases.

While the results provide a clearer indication of system behavior, performance remains dependent on ongoing market conditions, and variability should still be expected moving forward.
</div>`;
}

}

// ===== ENGINE =====
function processResult(start,end,title,type){

let d=analyzePeriod(start,end);
let duration=calcDaysInclusive(start,end);

let html=`
<div class="section-title">${title}</div>

<div class="data-grid">
<div class="data-item">Balance: $${fmt(d.endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(d.total)}</div>
<div class="data-item">Growth: ${d.growth.toFixed(2)}%</div>
<div class="data-item">Track Record: ${duration} days</div>
</div>
`;

if(type==="30"||type==="60"||type==="90"){
html+=`<div style="margin-top:20px"></div>
<div class="section-title">Performance Summary</div>
${generateNarrative(start,end,type)}`;
}

document.getElementById("breakdown").innerHTML=html;

let system=document.getElementById("software").value||"N/A";

ghlText=`System: ${system}
${title}
Balance: $${fmt(d.endBal)}
Closed Profit: $${fmt(d.total)}
Growth: ${d.growth.toFixed(2)}%
Track Record: ${duration} days`;

lastStats={title,...d,duration,system};
}

// ===== BUTTONS =====
function run(type){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date(start);
end.setDate(end.getDate()+(Number(type)-1));

processResult(start,end,type+" Days",type);
}

function runWeekly(){
let start=new Date(document.getElementById("weekStart").value);
let end=new Date(document.getElementById("weekEnd").value);
processResult(start,end,"Weekly","weekly");
}

function runDetailed(){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

processResult(new Date(first["Close date"]), new Date(), "Detailed Review","detailed");
}

function showWeekly(){
document.getElementById("weeklyBox").style.display="block";
}

// ===== COPY =====
function copyNote(){
if(!ghlText) return alert("Run report first");
navigator.clipboard.writeText(ghlText);
alert("Copied");
}

function copyEmail(){
if(!lastStats.title) return alert("Run report first");

let email=`Hi,

Here is your ${lastStats.title} performance update for ${lastStats.system}.

The account is currently at $${fmt(lastStats.endBal)}, with a closed result of $${fmt(lastStats.total)}, reflecting ${lastStats.growth.toFixed(2)}% over ${lastStats.duration} days.

Performance remains dependent on market conditions, and fluctuations including drawdown and recovery are part of normal system behavior.

Best regards`;

navigator.clipboard.writeText(email);
alert("Copied");
}

// ===== OVERVIEW =====
function renderAccount(){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let system=document.getElementById("software").value||"N/A";

let firstClose=new Date(first["Close date"]);
let lastActivity=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let duration=calcDaysInclusive(firstClose,lastActivity);

let endBal=getBalanceAt(lastActivity);
let closed=sum(get(r=>r.Type==="Closed position"));
let startBal=getBalanceAt(firstClose);
let growth=startBal?(closed/startBal)*100:0;

document.getElementById("overview").innerHTML=`
<div class="section-title">Overview</div>

<div class="data-grid">
<div class="data-item">System<br><h2>${system}</h2></div>
<div class="data-item">Balance<br><h2>$${fmt(endBal)}</h2></div>
<div class="data-item">Growth<br><h2>${growth.toFixed(2)}%</h2></div>
<div class="data-item">Closed Profit<br>$${fmt(closed)}</div>
<div class="data-item">First Close<br>${firstClose.toLocaleDateString()}</div>
<div class="data-item">Last Activity<br>${lastActivity.toLocaleDateString()}</div>
<div class="data-item">Track Record<br>${duration} days</div>
</div>

<div class="note">Auto-calculated based on account history</div>
`;
}

</script>

</body>
</html>
