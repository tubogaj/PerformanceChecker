<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body { font-family:-apple-system,'Segoe UI'; background:#f4f4f5; padding:50px; color:#111; }
.container { max-width:1200px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.data-grid-5 {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.data-grid-4 {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
  text-align:center;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

/* GUIDE MODAL */

/* GLASS EFFECT */
.guide-box {
  width:95%;
  max-width:1300px;
  height:90%;
  border-radius:20px;
  display:flex;
  overflow:hidden;

  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.2);
}
/* MENU */
.guide-menu {
  width:220px;
  background: rgba(0,0,0,0.85);
  color:#fff;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.guide-menu div {
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.guide-menu div:hover {
  background:#333;
  transform:translateX(3px);
}

.guide-menu div.active {
  background:#444;
}

/* CONTENT */
.guide-content {
  flex:1;
  padding:25px;
  overflow:auto;
  color:#111;
}

/* TYPOGRAPHY */
.guide-content h3 {
  margin-top:0;
  font-size:22px;
}

.guide-content h4 {
  margin-top:20px;
  font-size:16px;
  color:#333;
}

.guide-content p {
  line-height:1.5;
  margin:8px 0;
}

.guide-content ul {
  padding-left:18px;
}  
.guide-modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.guide-menu {
  width:220px;
  background:#111;
  color:#fff;
  padding:20px;
}

.guide-menu div {
  padding:12px;
  cursor:pointer;
  border-radius:8px;
}
.guide-menu div:hover { background:#333; }

.guide-content {
  padding:30px;
}

.close-btn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:20px;
  cursor:pointer;
  color:#fff;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }
  
</style>
</head>

<script>
function openGuide(){
  document.getElementById("guideModal").style.display="flex";
  loadGuide('how');
}
function closeGuide(){
  document.getElementById("guideModal").style.display="none";
}  
function hideAllDateSelectors(){
  document.getElementById("weeklyBox").style.display="none";
  document.getElementById("customBox").style.display="none";
}
function showWeekly(){ hideAllDateSelectors(); weeklyBox.style.display="block"; }
function showDetailed(){ hideAllDateSelectors(); runDetailed(); }
function showCustom(){
  hideAllDateSelectors();
  document.getElementById("customBox").style.display="block";
}

function runCustom(){
  let s = document.getElementById("customStart").value;
  let e = document.getElementById("customEnd").value;

  if(!s || !e) return alert("Select dates");

  render(new Date(s), new Date(e), "Custom Review", "custom");
}
function runWeekly(){
  if(!weekStart.value || !weekEnd.value) return alert("Select dates");
  render(new Date(weekStart.value), new Date(weekEnd.value), "Weekly Review","weekly");
}

let rows=[], ghlText="";
// ===== FIX MISSING ELEMENT REFERENCES =====
const weeklyBox = document.getElementById("weeklyBox");
const customBox = document.getElementById("customBox");

const weekStart = document.getElementById("weekStart");
const weekEnd = document.getElementById("weekEnd");

const customStart = document.getElementById("customStart");
const customEnd = document.getElementById("customEnd");

const fileInput = document.getElementById("fileInput");
const onboarding = document.getElementById("onboarding");
const software = document.getElementById("software");

const overview = document.getElementById("overview");
const breakdown = document.getElementById("breakdown");
const fmt=v=>Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

fileInput.onchange=init;
onboarding.onchange=init;

function init(){
const file=fileInput.files[0], onboard=onboarding.value;
if(!file||!onboard) return;
const r=new FileReader();
r.onload=e=>{ rows=parseCSV(e.target.result); renderAccount(); };
r.readAsText(file);
}

function parseCSV(t){
const l=t.split("\n").filter(x=>x.trim());
const h=l[1].split(",");
return l.slice(2).map(x=>{
const v=x.split(","), o={};
h.forEach((k,i)=>o[k.trim()]=v[i]?.trim());
return o;
});
}

const sum=a=>a.reduce((s,v)=>s+v,0);
const get=c=>rows.filter(c).map(r=>+r["Net profit"]||0);

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getLastActivity(){
return new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
}

function getBalanceAt(d){
return sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d))
- sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d))
+ sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
}

function getFloatingPL(){
return sum(rows.filter(r=>r.Type==="Open position").map(r=>+r["Net profit"]||0));
}

function getTotalCapital(onboardDate){

let o = new Date(onboardDate);

// ✅ 1. BALANCE BEFORE OR ON ONBOARDING
let startingBalance =
  sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=o))
- sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=o))
+ sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=o));

// ✅ 2. DEPOSITS AFTER ONBOARDING
let depositsAfter =
  sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>o));

// ✅ 3. WITHDRAWALS AFTER ONBOARDING
let withdrawalsAfter =
  sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>o));

// ✅ FINAL
return startingBalance + depositsAfter - Math.abs(withdrawalsAfter);
}

function analyze(start,end){
let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end);
let total=sum(trades.map(r=>+r["Net profit"]||0));
let startBal=getBalanceAt(start);
return { total, endBal:getBalanceAt(end), growth:startBal?(total/startBal)*100:0 };
}

let guideData = {

how: `

desc: `

calc: `
<h3>Calculations & Logic</h3>

<h4>System Description</h4>
<p id="systemGuideText">Select a system to view behavior.</p>

};

function loadGuide(type){

  document.getElementById("guideContent").innerHTML = guideData[type];

  document.querySelectorAll(".guide-menu div")
    .forEach(el => el.classList.remove("active"));

  // FIX: safe event handling
  let activeBtn = document.querySelector(`[onclick="loadGuide('${type}')"]`);
  if(activeBtn) activeBtn.classList.add("active");

  if(type==="calc"){
    let system = document.getElementById("software").value;
    if(system){
      document.getElementById("systemGuideText").innerText = systemNarrative(system);
    }
  }
}

 function searchGuide(){

  let input = document.getElementById("guideSearch").value.toLowerCase();
  let content = document.getElementById("guideContent");

  let text = content.innerText.toLowerCase();

  if(!input){
    loadGuide('how'); // reset (simple reload behavior)
    return;
  }

  let highlighted = content.innerHTML.replace(
    new RegExp(input, "gi"),
    match => `<mark>${match}</mark>`
  );

  content.innerHTML = highlighted;
} 
// ===== SYSTEM =====
function systemNarrative(system){
if(system==="R2") return "This reflects grid-based execution where positions are layered and recovery is driven by price retracement.";
if(system==="R2.5") return "This reflects an amplified grid strategy where exposure increases both growth and drawdown cycles.";
if(["R10","R50","R400"].includes(system)) return "This reflects a diversified AI allocation model adapting across multiple strategies.";
if(system==="RX25") return "This reflects adaptive exposure across forex and gold based on volatility.";
if(system==="RX5") return "This reflects a conservative allocation approach focused on stability.";
if(system==="RC30") return "This reflects high-volatility crypto market behavior.";
if(system==="RS15") return "This reflects event-driven trading with selective participation.";
if(system==="RA10") return "This reflects reversal-based execution focused on turning points.";
return "";
}

// ===== NARRATIVE =====
function generateNarrative(start,end,type){

let d=analyze(start,end);
let system=document.getElementById("software").value;

let startBal = getBalanceAt(start);
let endBal = getBalanceAt(end);

// TOTAL TRADES (PERIOD ONLY)
let trades = rows.filter(r =>
  r.Type==="Closed position" &&
  new Date(r["Close date"])>=start &&
  new Date(r["Close date"])<=end
).length;

let win = d.total >= 0;

// ===== 60 DAYS (WITH COMPARISON) =====
if(type==="60"){

let mid = new Date(start);
mid.setDate(mid.getDate()+29);

let first30 = analyze(start, mid);
let next30 = analyze(mid, end);

// TREND
let comparison = "";
if(next30.total > first30.total){
  comparison = "Performance improved in the second 30-day period, indicating stronger alignment with market conditions.";
}
else if(next30.total < first30.total){
  comparison = "Performance softened in the second 30-day period, reflecting a shift in market behavior.";
}
else{
  comparison = "Performance remained relatively consistent across both 30-day periods.";
}

let intro = win
? `The account closed the 60-day period with a net gain of $${fmt(d.total)}.`
: `The account closed the 60-day period with a net loss of $${fmt(Math.abs(d.total))}.`;

return `<div class="data-item">

${intro}

The account balance stands at $${fmt(endBal)}, representing a growth of ${((d.total/startBal)*100||0).toFixed(2)}%.

A total of ${trades} trades were closed, generating $${fmt(d.total)} in closed profit.

During the first 30 days, the account produced $${fmt(first30.total)}, followed by $${fmt(next30.total)} in the next 30 days.

${comparison}

${win
? "The system is currently capitalizing on market conditions through the following approach:"
: "The system is currently navigating market conditions using the following approach:"}

${systemNarrative(system)}

${win
? "This indicates the system is aligning well with current market behavior."
: "This reflects a temporary phase where market conditions are less favorable, which is part of the system’s cycle."}

</div>`;
}

// ===== OTHER TIMEFRAMES =====

let intro = win
? `The account generated a net gain of $${fmt(d.total)} during this period.`
: `The account recorded a net loss of $${fmt(Math.abs(d.total))} during this period.`;

// TIMEFRAME CONTEXT
let timeframeText="";

if(type==="30"){
  timeframeText = win
  ? "The first 30 days reflect a strong initial alignment with market opportunities."
  : "The first 30 days reflect an early phase where market conditions were less favorable.";
}

if(type==="90"){
  timeframeText = win
  ? "The 90-day period highlights sustained execution across varying market environments."
  : "The 90-day view shows how extended conditions have impacted overall performance.";
}

return `<div class="data-item">

${intro}

${timeframeText}

The account balance is currently at $${fmt(endBal)}, representing a growth of ${((d.total/startBal)*100||0).toFixed(2)}%.

A total of ${trades} trades were closed during this period, generating $${fmt(d.total)} in closed profit.

${win
? "The system is currently capitalizing on market conditions through the following approach:"
: "The system is currently navigating market conditions using the following approach:"}

${systemNarrative(system)}

${win
? "The system is operating in favorable conditions, allowing efficient execution."
: "The system is currently experiencing a more challenging environment, which is part of expected performance cycles."}

</div>`;
}
// ===== DETAILED NARRATIVE (ADD THIS WHOLE BLOCK) =====
function detailedNarrative(start,end){

let d = analyze(start,end);

let balances=[];
rows.forEach(r=>{
  if(r.Type==="Closed position"){
    let dt=new Date(r["Close date"]);
    if(dt>=start && dt<=end){
      balances.push({dt,b:getBalanceAt(dt)});
    }
  }
});

if(!balances.length) return "";

let initial = balances[0].b;
let initialDate = balances[0].dt;

let lowest = Math.min(...balances.map(x=>x.b));
let lowestObj = balances.find(x=>x.b===lowest);

let finalBal = balances[balances.length-1].b;
let lastDate = balances[balances.length-1].dt;

// deposits & withdrawals
let deposits = sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));
let withdrawals = sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));

let ddPct = ((lowest-initial)/initial)*100;
let growthPct = ((finalBal-initial)/initial)*100;

let recovered = finalBal > lowest;

return `<div class="data-item">

The account began this period on ${initialDate.toLocaleDateString()} with a starting balance of $${fmt(initial)}.

${deposits>0 ? `During this timeframe, a total deposit of $${fmt(deposits)} was added to the account.` : ""}
${Math.abs(withdrawals)>0 ? `A total withdrawal of $${fmt(Math.abs(withdrawals))} was made during this period.` : ""}

As trading activity progressed, the account experienced fluctuations, reaching a low of $${fmt(lowest)} on ${lowestObj.dt.toLocaleDateString()}, representing a drawdown of ${ddPct.toFixed(2)}%.

${recovered
? `Following this decline, the account demonstrated recovery, regaining strength and stabilizing above its lower levels.`
: `The account has not yet fully recovered from this drawdown phase.`}

As of the last recorded activity on ${lastDate.toLocaleDateString()}, the account balance stands at $${fmt(finalBal)}.

Overall, the system generated a total closed profit of $${fmt(d.total)}, resulting in a growth of ${growthPct.toFixed(2)}% over the period.

This performance illustrates how the system navigates changing market conditions, adapting through both drawdown and recovery phases.

</div>`;
}

// ===== RUN =====
// ===== RUN =====
function run(type){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]), e=new Date(s); e.setDate(e.getDate()+(+type-1));
render(s,e,type+" Days",type);
}

function runDetailed(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]);
let e=getLastActivity();
render(s,e,"Detailed Review","detailed");
}

// ===== RENDER =====
function render(start,end,title,type){
if(!rows.length){
  alert("Upload CSV first");
  return;
}

if(!onboarding.value){
  alert("Select onboarding date");
  return;
}
let d=analyze(start,end);
let first=getFirstClose(new Date(onboarding.value));
let last=getLastActivity();
let track=Math.floor((last-new Date(first["Close date"]))/(1000*60*60*24))+1;
  
let html=`
<div class="data-grid-5">
<div class="data-item">System<br><h3>${software.value||"N/A"}</h3></div>
<div class="data-item">Balance<br><h3>$${fmt(d.endBal)}</h3></div>
<div class="data-item">Closed Profit<br><h3>$${fmt(d.total)}</h3></div>
<div class="data-item">Floating P/L<br><h3>$${fmt(getFloatingPL())}</h3></div>
<div class="data-item">Growth<br><h3>${d.growth.toFixed(2)}%</h3></div>
</div>

${type==="weekly" ? `
<br>

// ===== COPY =====
function copyNote(){

  let title = document.querySelector("#breakdown .section-title")?.innerText || "";
  let output = "";

  // ===== GET DATA GRID VALUES CLEANLY =====
  let items = document.querySelectorAll("#breakdown .data-grid-5 .data-item");

  let cleanData = [];

  items.forEach(item => {
    let lines = item.innerText.split("\n").map(x => x.trim()).filter(Boolean);

    if(lines.length >= 2){
      cleanData.push(`${lines[0]}: ${lines[1]}`);
    }
  });

  // ===== WEEKLY = DATA ONLY =====
  if(title.toLowerCase().includes("weekly")){
    output = cleanData.join("\n");
  }

  // ===== CUSTOM + OTHERS = FULL =====
  else{
    let fullText = document.getElementById("breakdown").innerText
      .replace(/\n{3,}/g,"\n\n")
      .trim();

    output = cleanData.join("\n") + "\n\n" + fullText;
  }

  navigator.clipboard.writeText(output);
  alert("Copied clean for GHL");
}
