<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body { font-family:-apple-system,'Segoe UI'; background:#f4f4f5; padding:50px; color:#111; }
.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex; justify-content:space-between; align-items:center; }
.logo { height:200px; }

.file-row { display:flex; align-items:center; gap:15px; margin-bottom:10px; }

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:5px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">

<div class="file-row">
  <input type="file" id="fileInput">
</div>

<select id="software">
<option value="">Select System</option>
<option>R2</option><option>R2.5</option><option>R10</option><option>R50</option>
<option>R400</option><option>RX25</option><option>RC30</option>
<option>RX5</option><option>RS15</option><option>RA10</option>
</select>

<input type="date" id="onboarding">

<div id="weeklyBox" style="display:none">
<input type="date" id="weekStart">
<input type="date" id="weekEnd">
<button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="showDetailed()">Detailed Review</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

// ===== FIXED UI =====
function hideAllDateSelectors(){
  weeklyBox.style.display="none";
}

function showWeekly(){
  hideAllDateSelectors();
  weeklyBox.style.display="block";
}

function showDetailed(){
  hideAllDateSelectors();
  runDetailed();
}

function runWeekly(){
  if(!weekStart.value || !weekEnd.value) return alert("Select dates");
  render(new Date(weekStart.value), new Date(weekEnd.value), "Weekly Review","weekly");
}

// ===== CORE =====
let rows=[], ghlText="";
const fmt=v=>Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

fileInput.onchange=init;
onboarding.onchange=init;

function init(){
const file=fileInput.files[0], onboard=onboarding.value;
if(!file||!onboard) return;
const r=new FileReader();
r.onload=e=>{ rows=parseCSV(e.target.result); renderAccount(); };
r.readAsText(file);
}

function parseCSV(t){
const l=t.split("\n").filter(x=>x.trim());
const h=l[1].split(",");
return l.slice(2).map(x=>{
const v=x.split(","), o={};
h.forEach((k,i)=>o[k.trim()]=v[i]?.trim());
return o;
});
}

const sum=a=>a.reduce((s,v)=>s+v,0);
const get=c=>rows.filter(c).map(r=>+r["Net profit"]||0);

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(d){
return sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d))
- sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d))
+ sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
}

function getFloatingPL(){
return sum(rows.filter(r=>r.Type==="Open position").map(r=>+r["Net profit"]||0));
}

function analyze(start,end){
let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end);
let total=sum(trades.map(r=>+r["Net profit"]||0));
let startBal=getBalanceAt(start);
return { total, endBal:getBalanceAt(end), growth:startBal?(total/startBal)*100:0 };
}

// ===== SYSTEM =====
function systemNarrative(system){
if(system==="R2") return "This reflects grid-based execution where positions are layered and recovery is driven by price retracement.";
if(system==="R2.5") return "This reflects an amplified grid strategy where exposure increases both growth and drawdown cycles.";
if(["R10","R50","R400"].includes(system)) return "This reflects a diversified AI allocation model adapting across multiple strategies.";
if(system==="RX25") return "This reflects adaptive exposure across forex and gold based on volatility.";
if(system==="RX5") return "This reflects a conservative allocation approach focused on stability.";
if(system==="RC30") return "This reflects high-volatility crypto market behavior.";
if(system==="RS15") return "This reflects event-driven trading with selective participation.";
if(system==="RA10") return "This reflects reversal-based execution focused on turning points.";
return "";
}

// ===== NARRATIVE =====
function generateNarrative(start,end,type){

let d=analyze(start,end);
let system=document.getElementById("software").value;
let positive=d.total>=0;

let tone=positive
? "Overall, the system maintained positive performance during this period."
: "The period reflects a drawdown phase, which is part of normal system behavior under certain market conditions.";

let deposits=sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));
let withdrawals=sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));

let capitalFlow="";
if(deposits>0) capitalFlow+=`A deposit of $${fmt(deposits)} was made during this period. `;
if(Math.abs(withdrawals)>0) capitalFlow+=`A withdrawal of $${fmt(Math.abs(withdrawals))} occurred during this period.`;

// weekly fallback uses 30
if(type==="weekly") type="30";

if(type==="60"){
let mid=new Date(start); mid.setDate(mid.getDate()+29);
let first30=analyze(start,mid);
let next30=analyze(mid,end);

return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over the 60-day period.
The balance movement during this timeframe reflects both trading activity and capital adjustments. ${capitalFlow}
The system generated a total closed profit of $${fmt(d.total)} over the period.
During the first 30 days, the account produced $${fmt(first30.total)}, while the following 30-day period resulted in $${fmt(next30.total)}, providing a clear comparison of how performance evolved.
${systemNarrative(system)}
${tone}
Performance remains dependent on market conditions, and fluctuations including drawdown and recovery are part of normal system behavior.
</div>`;
}

if(type==="90"){
return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over the 90-day period.
The balance movement during this timeframe reflects both trading performance and any capital adjustments made. ${capitalFlow}
The system generated a total closed profit of $${fmt(d.total)} across the period.
${systemNarrative(system)}
${tone}
This longer duration provides a clearer view of how the system behaves across different market conditions, including periods of volatility, stability, and recovery.
Performance remains dependent on market conditions, and variability should still be expected moving forward.
</div>`;
}

if(type==="30"){
return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over the first 30 days.
The balance movement reflects early-stage execution along with any capital adjustments. ${capitalFlow}
The system generated a closed profit of $${fmt(d.total)} during this period.
${systemNarrative(system)}
${tone}
Performance remains dependent on market conditions, and early fluctuations are part of normal system behavior.
</div>`;
}
}

// ===== DETAILED =====
function detailedNarrative(start,end){

let d=analyze(start,end);

let balances=[];
rows.forEach(r=>{
if(r.Type==="Closed position"){
let dt=new Date(r["Close date"]);
if(dt>=start && dt<=end){
balances.push({dt,b:getBalanceAt(dt)});
}
}
});

if(!balances.length) return "";

let initial=balances[0].b;
let initialDate=balances[0].dt;

let lowest=Math.min(...balances.map(x=>x.b));
let lowestObj=balances.find(x=>x.b===lowest);

let finalBal=balances[balances.length-1].b;

let belowInitial = lowest < initial;
let recovered = finalBal > initial;

let ddPct = ((lowest-initial)/initial)*100;
let recPct = ((finalBal-initial)/initial)*100;

return `<div class="data-item">
The account started at $${fmt(initial)} on ${initialDate.toLocaleDateString()}.
During the selected period, the account reached a low of $${fmt(lowest)} on ${lowestObj.dt.toLocaleDateString()}, representing ${ddPct.toFixed(2)}%.
${belowInitial ? "The account did go below the initial capital during this period." : "The account remained above the initial capital throughout the period."}
${recovered ? `The account recovered and is currently above the initial level, now at $${fmt(finalBal)}, representing ${recPct.toFixed(2)}% growth.` : `The account has not fully recovered to the initial level and is currently at $${fmt(finalBal)}.`}
The system generated a total closed profit of $${fmt(d.total)} during this timeframe.
Performance remains dependent on market conditions, and fluctuations, including drawdown and recovery, are part of normal system behavior.
</div>`;
}

// ===== RUN =====
function run(type){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]), e=new Date(s); e.setDate(e.getDate()+(+type-1));
render(s,e,type+" Days",type);
}

function runDetailed(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]);
let e=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
render(s,e,"Detailed Review","detailed");
}

// ===== RENDER =====
function render(start,end,title,type){

let d=analyze(start,end);
let first=getFirstClose(new Date(onboarding.value));
let firstDate=new Date(first["Close date"]);
let lastDate=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
let track=Math.floor((lastDate-firstDate)/(1000*60*60*24))+1;

let html=`
<div class="section-title">${title}</div>
<div class="data-grid">
<div class="data-item">Balance: $${fmt(d.endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(d.total)}</div>
<div class="data-item">Growth: ${d.growth.toFixed(2)}%</div>
<div class="data-item">Track Record: ${track} days</div>
<div class="data-item">First Close: ${firstDate.toLocaleDateString()}</div>
<div class="data-item">Last Activity: ${lastDate.toLocaleDateString()}</div>
</div>`;

if(["30","60","90"].includes(type)){
html+=`<div class="section-title">Performance Summary</div>${generateNarrative(start,end,type)}`;
}

if(type==="detailed"){
html+=`<div class="section-title">Performance Summary</div>${detailedNarrative(start,end)}`;
}

breakdown.innerHTML=html;
ghlText=html.replace(/<[^>]*>/g,'');

}

// ===== OVERVIEW =====
function renderAccount(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;

let fc=new Date(f["Close date"]);
let last=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let closed=sum(get(r=>r.Type==="Closed position"));
let startBal=getBalanceAt(fc);
let growth=startBal?(closed/startBal)*100:0;

overview.innerHTML=`
<div class="section-title">Overview</div>
<div class="data-grid">
<div class="data-item">System<br><h3>${software.value||"N/A"}</h3></div>
<div class="data-item">Balance<br><h3>$${fmt(getBalanceAt(last))}</h3></div>
<div class="data-item">Growth<br><h3>${growth.toFixed(2)}%</h3></div>
<div class="data-item">Closed Profit<br><h3>$${fmt(closed)}</h3></div>
<div class="data-item">Floating P/L<br><h3>$${fmt(getFloatingPL())}</h3></div>
<div class="data-item">Total Capital<br>$${fmt(getTotalCapital(onboarding.value))}</div>
<div class="data-item">First Close<br>${fc.toLocaleDateString()}</div>
<div class="data-item">Last Activity<br>${last.toLocaleDateString()}</div>
<div class="data-item">Track Record<br>${Math.floor((last-fc)/(1000*60*60*24)+1)} days</div>
</div>`;
}

function copyNote(){ navigator.clipboard.writeText(ghlText); alert("Copied"); }
function copyEmail(){ navigator.clipboard.writeText(ghlText); alert("Copied"); }

</script>

</body>
</html>
