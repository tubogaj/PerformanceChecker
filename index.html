<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conan | Account Performance Checker</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  color: #000;
  padding: 30px;
}
.container {
  max-width: 1100px;
  margin: auto;
}
h1 {
  text-align: center;
}
input, button {
  padding: 10px;
  margin: 5px;
}
button {
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
}
.section {
  margin-top: 20px;
  padding: 20px;
  border: 1px solid #000;
}
</style>
</head>

<body>

<div class="container">
<h1>Conan<br>Account Performance Checker</h1>

<div>
  <input type="file" id="fileInput" accept=".csv"><br><br>

  Name:<br>
  <input type="text" id="name"><br>

  Software:<br>
  <input type="text" id="software"><br>

  Onboarding Date:<br>
  <input type="date" id="onboarding"><br>
</div>

<div>
  <button onclick="run('weekly')">Weekly</button>
  <button onclick="run('30')">30 Days</button>
  <button onclick="run('60')">60 Days</button>
  <button onclick="run('90')">90 Days</button>
  <button onclick="run('outlook')">Outlook</button>
</div>

<div id="result" class="section"></div>

</div>

<script>

let rows = [];

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  const headers = lines[1].split(",");

  return lines.slice(2).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

function loadFile(callback) {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Upload CSV");

  const reader = new FileReader();
  reader.onload = e => {
    rows = parseCSV(e.target.result);
    callback();
  };
  reader.readAsText(file);
}

function calcData(start, end, onboard) {

  let initialDeposit = 0;
  let closedProfit = 0;
  let floating = 0;
  let firstClose = null;
  let funding = [];

  rows.forEach(r => {

    let date = new Date(r["Close date"]);
    let profit = Number(r["Net profit"]) || 0;
    let type = r.Type?.toLowerCase() || "";

    // INITIAL DEPOSIT (from onboarding)
    if (type.includes("deposit") && date >= onboard) {
      initialDeposit += profit;
    }

    // FUNDING (ONLY WITHIN SELECTED PERIOD)
    if ((type.includes("deposit") || type.includes("withdraw")) &&
        date >= start && date <= end) {
      funding.push(`${r["Close date"]} → ${profit}`);
    }

    // CLOSED TRADES
    if (r.Type !== "Open position" && r["Close date"]) {

      if (!firstClose && date >= onboard) {
        firstClose = r["Close date"];
      }

      if (date >= start && date <= end) {
        closedProfit += profit;
      }
    }

    // FLOATING
    if (r.Type === "Open position") {
      floating += profit;
    }

  });

  // TOTAL RETURN (ONBOARDING → END DATE)
  let totalProfitFromStart = 0;

  rows.forEach(r => {
    let date = new Date(r["Close date"]);
    let profit = Number(r["Net profit"]) || 0;

    if (date >= onboard && date <= end && r.Type !== "Open position") {
      totalProfitFromStart += profit;
    }
  });

  let percent = initialDeposit
    ? (totalProfitFromStart / initialDeposit) * 100
    : 0;

  return {
    initialDeposit,
    totalReturn: totalProfitFromStart,
    percent,
    closedProfit,
    floating,
    firstClose,
    funding
  };
}

function run(type) {

  loadFile(() => {

    const name = document.getElementById("name").value;
    const software = document.getElementById("software").value;
    const onboard = new Date(document.getElementById("onboarding").value);

    let start, end = new Date();

    if (type === "weekly") {
      start = new Date();
      start.setDate(start.getDate() - 7);
    }

    if (type === "30") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 30);
    }

    if (type === "60") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 60);
    }

    if (type === "90") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 90);
    }

    if (type === "outlook") {
      start = onboard;
      end = new Date();
    }

    let data = calcData(start, end, onboard);

    let paragraph = "";

    if (type === "weekly") {
      paragraph = `Over the past week, the account moved through a short-term cycle of execution, capturing a closed result of ${data.closedProfit.toFixed(2)}. 
This period reflects the most recent trading behavior, where positions were actively managed and adjusted in response to market conditions. 
Short-term movement like this highlights whether the system is currently capitalizing on opportunities efficiently or facing temporary pressure from market volatility.`;
    }

    if (type === "30") {
      paragraph = `From the onboarding phase through the first 30 days, the account began establishing its trading rhythm. 
During this period, a total return of ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%) was achieved. 
This phase often includes early positioning, initial wins, and adjustments, giving a realistic view of how the system behaves when first exposed to live market conditions.`;
    }

    if (type === "60") {
      paragraph = `At the 60-day mark, the account shows a clearer pattern of behavior beyond initial execution. 
With a total return of ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%), this phase reveals whether the system is gaining consistency, maintaining stability, or encountering extended drawdowns. 
It reflects how well the strategy sustains performance over time.`;
    }

    if (type === "90") {
      paragraph = `Across the full 90-day cycle, the account demonstrates its complete performance profile. 
The total return of ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%) reflects how the system navigated both favorable and challenging conditions. 
This longer period gives a more reliable picture of consistency, recovery ability, and overall trading discipline.`;
    }

    if (type === "outlook") {
      paragraph = `Looking forward, the account’s trajectory suggests a continuation of its current behavior pattern. 
Based on accumulated performance, the system demonstrates a balance between growth opportunities and risk exposure. 
While fluctuations are expected, the data indicates a realistic path of gradual performance development over time.`;
    }

    let trackDays = Math.floor((new Date() - onboard) / (1000*60*60*24));

    document.getElementById("result").innerHTML = `
      <b>Name:</b> ${name}<br>
      <b>Software:</b> ${software}<br>
      <b>Onboarding Date:</b> ${document.getElementById("onboarding").value}<br><br>

      <b>Total Return:</b> ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%)<br>
      <b>Track Record:</b> ${trackDays} days<br>
      <b>Closed Profit (Selected Period):</b> ${data.closedProfit.toFixed(2)}<br>
      <b>Floating P/L:</b> ${data.floating.toFixed(2)}<br>
      <b>First Trade Close:</b> ${data.firstClose || "N/A"}<br><br>

      <b>Funding Activity (Selected Period):</b><br>
      ${data.funding.length ? data.funding.join("<br>") : "None"}<br><br>

      <p>${paragraph}</p>
    `;

  });

}

</script>

</body>
</html>
