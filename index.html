<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #0a0a0a;
  color: #fff;
  padding: 40px;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
}

/* GLASS EFFECT */
.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 100px;
}

/* INPUTS */
input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: #fff;
  margin: 6px 4px;
  width: 220px;
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* BUTTONS */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: #fff;
  cursor: pointer;
  transition: 0.25s ease;
  font-weight: 500;
}

button:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-1px);
}

/* SECTION TITLE */
.section-title {
  font-size: 15px;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
}

/* DATA BLOCK */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 12px;
}

.data-item {
  background: rgba(255,255,255,0.03);
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
}

.data-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

.data-value {
  font-size: 16px;
  margin-top: 4px;
  font-weight: 600;
}

/* WEEKLY RANGE */
#weeklyRange {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="glass header">
  <h2 style="font-weight:500;">Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<!-- INPUT -->
<div class="glass">
  <input type="file" id="fileInput" accept=".csv"><br>

  <input type="text" id="name" placeholder="Client Name">
  <input type="text" id="software" placeholder="Software">
  <input type="date" id="onboarding">

  <div id="weeklyRange" style="display:none;">
    Start: <input type="date" id="weekStart">
    End: <input type="date" id="weekEnd">
  </div>

  <br><br>

  <button onclick="run('weekly')">Weekly</button>
  <button onclick="run('30')">30 Days</button>
  <button onclick="run('60')">60 Days</button>
  <button onclick="run('90')">90 Days</button>
</div>

<!-- OVERVIEW -->
<div id="overview" class="glass"></div>

<!-- BREAKDOWN -->
<div id="breakdown" class="glass"></div>

</div>

<script>

// ===== SAME LOGIC (UNCHANGED) =====

let rows=[];

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");

  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function loadFile(cb){
  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Upload CSV");

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    cb();
  };
  reader.readAsText(file);
}

function getClosed(start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type==="Closed position" && d>=start && d<=end;
  }).reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getDeposits(start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type==="Deposit" && d>=start && d<=end;
  }).reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getFloating(){
  return rows.filter(r=>r.Type==="Open position")
    .reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getFirstClose(onboard){
  return rows.find(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard);
}

function run(type){

loadFile(()=>{

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return alert("No closed trades found");

let firstDate=new Date(first["Close date"]);
let today=new Date();

// ===== ACCOUNT DETAILS =====

let closedTotal=getClosed(onboard,today);
let depositTotal=getDeposits(new Date("2000-01-01"),today);
let balance=depositTotal - closedTotal;
let floating=getFloating();

let initialDeposit=getDeposits(new Date("2000-01-01"),onboard);
let growthPct=initialDeposit?((balance-initialDeposit)/initialDeposit)*100:0;
let growthVal=balance-initialDeposit;

let track=Math.floor((today-firstDate)/(1000*60*60*24));

document.getElementById("overview").innerHTML=`
<div class="section-title">Account Details</div>
<div class="data-grid">
  <div class="data-item"><div class="data-label">Balance</div><div class="data-value">${balance.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closedTotal.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Floating P/L</div><div class="data-value">${floating.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthPct.toFixed(2)}% (${growthVal.toFixed(2)})</div></div>
  <div class="data-item"><div class="data-label">Track Record</div><div class="data-value">${track} days</div></div>
</div>
`;

// ===== TIMEFRAME =====

let start,end,title="";

if(type==="weekly"){
  document.getElementById("weeklyRange").style.display="block";
  start=new Date(document.getElementById("weekStart").value);
  end=new Date(document.getElementById("weekEnd").value);
  title=`Account Performance (${start.toLocaleDateString()} - ${end.toLocaleDateString()})`;
}
else{
  document.getElementById("weeklyRange").style.display="none";
  let days=Number(type);
  start=firstDate;
  end=new Date(firstDate);
  end.setDate(end.getDate()+days);
  title=`Account Performance (${days} Days)`;
}

let closed=getClosed(start,end);
let deposits=getDeposits(start,end);
let bal=deposits - closed;
let growthTF=initialDeposit?((bal-initialDeposit)/initialDeposit)*100:0;

document.getElementById("breakdown").innerHTML=`
<div class="section-title">${title}</div>
<div class="data-grid">
  <div class="data-item"><div class="data-label">Balance</div><div class="data-value">${bal.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closed.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Floating P/L</div><div class="data-value">${floating.toFixed(2)}</div></div>
  <div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthTF.toFixed(2)}%</div></div>
</div>
`;

});

}

</script>

</body>
</html>
