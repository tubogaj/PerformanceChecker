<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ridge Capital Solutions | Performance Checker</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  padding: 30px;
}
.container {
  max-width: 1100px;
  margin: auto;
  background: #ffffff;
  padding: 30px;
  border-radius: 10px;
}
h1 { text-align: center; }

.controls {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.section {
  margin-top: 20px;
  padding: 20px;
  border-radius: 8px;
  background: #eef2ff;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.summary-item {
  background: #ffffff;
  padding: 14px;
  border-radius: 6px;
  font-weight: bold;
}

button {
  padding: 10px 18px;
  border: none;
  background: #1d4ed8;
  color: #ffffff;
  border-radius: 6px;
  cursor: pointer;
}

canvas {
  margin-top: 25px;
  background: #fff;
  border-radius: 6px;
}

#actions {
  margin-top: 20px;
  display: flex;
  gap: 12px;
}

#emailModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}
#emailBox {
  background: white;
  width: 620px;
  margin: 8% auto;
  padding: 20px;
  border-radius: 8px;
}
textarea {
  width: 100%;
  height: 300px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ridge Capital Solutions<br>Trading Performance Analyzer</h1>

<div class="controls">
  <input type="file" id="fileInput" accept=".csv" />
  <label>Start Date <input type="date" id="startDate"></label>
  <label>End Date <input type="date" id="endDate"></label>
  <button onclick="analyze()">Analyze</button>
</div>

<div id="report"></div>

<div id="actions" style="display:none;">
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="openEmail()">Email Summary</button>
</div>
</div>

<div id="emailModal">
<div id="emailBox">
<h3>Email Summary (Copy & Paste)</h3>
<textarea id="emailText"></textarea><br><br>
<button onclick="copyEmail()">Copy</button>
<button onclick="closeEmail()">Close</button>
</div>
</div>

<script>

let chartInstance;
let uiData = {};
let balanceDates = [];
let balanceSeries = [];
let cumulativeProfitSeries = [];

function analyze() {

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Upload CSV");

  const start = new Date(document.getElementById("startDate").value);
  const end = new Date(document.getElementById("endDate").value);

  const reader = new FileReader();

  reader.onload = e => {

    const lines = e.target.result.split("\n").filter(l => l.trim());
    const headers = lines[0].split(",").map(h => h.trim());

    const rows = lines.slice(1).map(line => {
      const values = line.split(",");
      let obj = {};
      headers.forEach((h,i)=>obj[h]=values[i]?.trim());
      return obj;
    });

    const netKey = headers.find(h => h.toLowerCase().includes("net"));
    const closeKey = headers.find(h => h.toLowerCase().includes("close"));
    const typeKey = headers.find(h => h.toLowerCase().includes("type"));

    let deposits = 0;
    let balance = 0;
    let cumProfit = 0;
    let periodProfit = 0;

    balanceDates=[]; balanceSeries=[]; cumulativeProfitSeries=[];

    rows.forEach(r=>{

      const type = (r[typeKey]||"").toLowerCase();
      const profit = parseFloat(r[netKey]) || 0;

      if(type.includes("deposit")){
        deposits += profit;
        balance += profit;
        return;
      }

      if(type.includes("withdrawal")){
        balance += profit;
        return;
      }

      if(r[closeKey]){
        const d = new Date(r[closeKey]);

        balance += profit;
        cumProfit += profit;

        balanceDates.push(r[closeKey]);
        balanceSeries.push(balance);
        cumulativeProfitSeries.push(cumProfit);

        if(d>=start && d<=end){
          periodProfit += profit;
        }
      }

    });

    const performanceStatus = balance >= deposits ? "in profit" : "in drawdown";

    uiData = { balance, deposits, periodProfit };

    document.getElementById("report").innerHTML = `
    <div class="section">
      <h3>Account Performance Breakdown</h3>

      <div class="summary-grid">
        <div class="summary-item">Deposits<br>$${deposits.toLocaleString()}</div>
        <div class="summary-item">Balance<br>$${balance.toLocaleString()}</div>
        <div class="summary-item">Closed P/L (Period)<br>$${periodProfit.toLocaleString()}</div>
        <div class="summary-item">Status<br>${performanceStatus}</div>
      </div>

      <p style="margin-top:15px;">
        The account generated <b>$${periodProfit.toLocaleString()}</b> during the selected period.
        Current balance stands at <b>$${balance.toLocaleString()}</b>, relative to total deposits of
        <b>$${deposits.toLocaleString()}</b>, placing the account currently <b>${performanceStatus}</b>.
      </p>

      <canvas id="balanceChart"></canvas>
    </div>
    `;

    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById("balanceChart"),{
      type:"line",
      data:{
        labels:balanceDates,
        datasets:[
          {label:"Balance",data:balanceSeries,borderWidth:2},
          {label:"Cumulative Profit",data:cumulativeProfitSeries,borderWidth:2}
        ]
      }
    });

    document.getElementById("actions").style.display="flex";

  };

  reader.readAsText(file);
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  pdf.text("Performance Report",20,20);
  pdf.text(`Balance: $${uiData.balance}`,20,30);
  pdf.text(`Period Profit: $${uiData.periodProfit}`,20,40);
  pdf.save("report.pdf");
}

// EMAIL
function openEmail(){
  document.getElementById("emailText").value =
`Account generated $${uiData.periodProfit} during the selected period.
Current balance is $${uiData.balance}.`;
  document.getElementById("emailModal").style.display="block";
}

function copyEmail(){
  navigator.clipboard.writeText(document.getElementById("emailText").value);
}
function closeEmail(){
  document.getElementById("emailModal").style.display="none";
}

</script>

</body>
</html>
