<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, 'Segoe UI';
  background: #f4f4f5;
  padding: 50px;
  color: #111;
}

.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

input {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:5px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

.note {
  font-size:12px;
  color:#777;
  margin-top:10px;
}

h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass">
<h2>Account Performance Checker</h2>
</div>

<div class="glass">

<input type="file" id="fileInput"><br>
<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<div id="weeklyBox" style="display:none">
<input type="date" id="weekStart">
<input type="date" id="weekEnd">
<button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="runDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";
let lastStats={};

const fmt = v => Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

document.getElementById("fileInput").addEventListener("change",init);
document.getElementById("onboarding").addEventListener("change",init);

function init(){
const file=document.getElementById("fileInput").files[0];
const onboard=document.getElementById("onboarding").value;
if(!file||!onboard) return;

const reader=new FileReader();
reader.onload=e=>{
rows=parseCSV(e.target.result);
renderAccount();
};
reader.readAsText(file);
}

function parseCSV(text){
const lines=text.split("\n").filter(l=>l.trim());
const headers=lines[1].split(",");
return lines.slice(2).map(l=>{
const v=l.split(",");
let o={};
headers.forEach((h,i)=>o[h.trim()]=v[i]?.trim());
return o;
});
}

function sum(a){return a.reduce((s,v)=>s+v,0);}
function get(c){return rows.filter(c).map(r=>Number(r["Net profit"])||0);}

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(d){
let dep=sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d));
let wd=sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d));
let cl=sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
return dep-wd+cl;
}

// ===== OVERVIEW =====
function renderAccount(){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let firstClose=new Date(first["Close date"]);
let lastActivity=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let duration=Math.floor((lastActivity-firstClose)/(1000*60*60*24))+1;

let startBal=getBalanceAt(firstClose);
let endBal=getBalanceAt(lastActivity);

let closed=sum(get(r=>r.Type==="Closed position"));
let growth=startBal?(closed/startBal)*100:0;

document.getElementById("overview").innerHTML=`
<div class="section-title">Overview</div>

<div class="data-grid">
<div class="data-item">Balance<br><h2>$${fmt(endBal)}</h2></div>
<div class="data-item">Growth<br><h2>${growth.toFixed(2)}%</h2></div>
<div class="data-item">Closed Profit<br>$${fmt(closed)}</div>
</div>

<div style="margin-top:20px"></div>

<div class="section-title">Account Details</div>

<div class="data-grid">
<div class="data-item">First Close Trade<br>${firstClose.toLocaleDateString()}</div>
<div class="data-item">Last Activity Date<br>${lastActivity.toLocaleDateString()}</div>
<div class="data-item">Track Record<br>${duration} days</div>
</div>

<div class="note">This reflects the running performance of the account as of the last activity date.</div>
`;
}

// ===== NARRATIVE =====
function generateNarrative(start,end,type){

let trades=rows.filter(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end);

let profits=trades.map(r=>Number(r["Net profit"])||0);
let total=sum(profits);

let startBal=getBalanceAt(start);
let endBal=getBalanceAt(end);
let growth=startBal?(total/startBal)*100:0;

let running=0,peak=0,drawdown=false;

profits.forEach(p=>{
running+=p;
if(running>peak) peak=running;
if(running<peak) drawdown=true;
});

let recovered=running>=peak;

let behavior=drawdown
? (recovered
  ? "The account experienced drawdown followed by recovery toward the end of the period."
  : "The account experienced drawdown with recovery still in progress.")
: "The account maintained stable performance without significant drawdown.";

return `
<div style="margin-top:20px">
<div class="section-title">${type} Day Performance Commentary</div>
<div class="data-item">

During this period, ${trades.length} trades were executed.

${behavior}

The account generated a closed result of $${fmt(total)}, reaching a balance of $${fmt(endBal)}, reflecting a growth of ${growth.toFixed(2)}%.

Performance remains dependent on prevailing market conditions, where both drawdown and recovery phases are part of the system’s normal behavior.

</div></div>`;
}

// ===== ENGINE =====
function processResult(start,end,title,type){

let endBal=getBalanceAt(end);

let closedTF=sum(get(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end));

let startBal=getBalanceAt(start);
let growthTF=startBal?(closedTF/startBal)*100:0;

let duration =
type==="30"?30:
type==="60"?60:
type==="90"?90:
Math.floor((end-start)/(1000*60*60*24))+1;

let html=`
<div class="section-title">${title}</div>

<div class="data-grid">
<div class="data-item">Balance: $${fmt(endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(closedTF)}</div>
<div class="data-item">Growth: ${growthTF.toFixed(2)}%</div>
<div class="data-item">Track Record: ${duration} days</div>
</div>
`;

if(type==="30"||type==="60"||type==="90"){
html+=generateNarrative(start,end,type);
}

document.getElementById("breakdown").innerHTML=html;

ghlText=`${title}
Balance: $${fmt(endBal)}
Closed Profit: $${fmt(closedTF)}
Growth: ${growthTF.toFixed(2)}%
Track Record: ${duration} days`;

lastStats={title,endBal,closedTF,growthTF,duration};
}

// ===== BUTTONS =====
function run(type){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date(start);
end.setDate(end.getDate()+(Number(type)-1));

processResult(start,end,type+" Days",type);
}

function runWeekly(){
let start=new Date(document.getElementById("weekStart").value);
let end=new Date(document.getElementById("weekEnd").value);
processResult(start,end,"Weekly","weekly");
}

function runDetailed(){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date();

processResult(start,end,"Detailed Review","detailed");
}

function copyNote(){
if(!ghlText) return alert("Run first");
navigator.clipboard.writeText(ghlText);
alert("Copied");
}

function copyEmail(){
if(!lastStats.title) return alert("Run report first");

let email=`Hi,

Here is the performance update for ${lastStats.title}.

The account stands at $${fmt(lastStats.endBal)} with a closed result of $${fmt(lastStats.closedTF)}, reflecting ${lastStats.growthTF.toFixed(2)}% over ${lastStats.duration} days.

Performance remains dependent on market conditions, where drawdown and recovery cycles are part of normal system behavior.

Please let me know if you would like further details.

Best regards`;

navigator.clipboard.writeText(email);
alert("Copied");
}

function showWeekly(){
document.getElementById("weeklyBox").style.display="block";
}

</script>

</body>
</html>
