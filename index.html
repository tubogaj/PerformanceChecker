<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, 'Segoe UI';
  background: #f4f4f5;
  padding: 50px;
  color: #111;
}

.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex;justify-content:space-between;align-items:center; }

input {
  padding:10px;border-radius:8px;border:1px solid #ddd;margin:5px;
}

button {
  padding:10px 16px;
  border:none;border-radius:8px;
  background:#111;color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.hidden { display:none; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

.note {
  font-size:12px;
  color:#777;
  margin-top:10px;
}

h2 { font-size:28px;margin:0; }
h3 { font-size:22px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
</div>

<div class="glass">

<input type="file" id="fileInput" accept=".csv"><br>
<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<div id="weeklyBox" class="hidden">
  <input type="date" id="weekStart">
  <input type="date" id="weekEnd">
  <button onclick="run('weekly')">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="runDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";
let lastStats={};

const fmt = (v) => Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

document.getElementById("fileInput").addEventListener("change",loadAndInit);
document.getElementById("onboarding").addEventListener("change",loadAndInit);

function loadAndInit(){
  const file=document.getElementById("fileInput").files[0];
  const onboard=document.getElementById("onboarding").value;
  if(!file || !onboard) return;

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    renderAccount();
  };
  reader.readAsText(file);
}

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");
  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function sum(arr){ return arr.reduce((s,v)=>s+v,0); }

function get(cond){
  return rows.filter(cond).map(r=>Number(r["Net profit"])||0);
}

function getFirstClose(onboard){
  return rows
    .filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard)
    .sort((a,b)=>new Date(r["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(date){
  let dep=sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=date));
  let wd=sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=date));
  let closed=sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=date));
  return dep-wd+closed;
}

function calculateDuration(start,end){
  return Math.floor((end-start)/(1000*60*60*24))+1;
}

function analyzeBehavior(profits){
let running=0, peak=0, drawdown=false;

profits.forEach(p=>{
running+=p;
if(running>peak) peak=running;
if(running<peak) drawdown=true;
});

let recovered = running >= peak;

return {drawdown, recovered};
}

function generateNarrative(start,end,type){

let trades=rows.filter(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end);

let profits=trades.map(r=>Number(r["Net profit"])||0);
let totalProfit=sum(profits);

let startBal=getBalanceAt(start);
let endBal=getBalanceAt(end);
let growth=startBal?(totalProfit/startBal)*100:0;

let {drawdown,recovered}=analyzeBehavior(profits);

let performanceText="";
if(totalProfit>0){
  performanceText="The account closed the period in profit.";
}else if(totalProfit<0){
  performanceText="The account closed the period at a net loss, reflecting unfavorable market conditions.";
}else{
  performanceText="The account remained near break-even for the period.";
}

let behaviorText="";
if(drawdown){
  behaviorText=recovered
  ?"Drawdown was observed but recovery followed."
  :"Drawdown is present with recovery still ongoing.";
}else{
  behaviorText="Performance remained relatively stable.";
}

let timeframeNote = type==="30"
? "This represents short-term system behavior."
: type==="60"
? "This highlights how performance develops over time."
: "This reflects a full system cycle across varying market conditions.";

return `<div style="margin-top:20px">
<div class="section-title">${type} Day Performance Commentary</div>
<div class="data-item">

${performanceText}

${behaviorText}

Closed result: $${fmt(totalProfit)}  
Ending balance: $${fmt(endBal)}  
Growth: ${growth.toFixed(2)}%

${timeframeNote}

Performance remains dependent on market conditions.

</div></div>`;
}

function processResult(start,end,title,type){

let endBal=getBalanceAt(end);

let closedTF=sum(get(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end));

let startBal=getBalanceAt(start);
let growthTF=startBal?(closedTF/startBal)*100:0;

let duration = type==="30"?30:type==="60"?60:type==="90"?90:calculateDuration(start,end);

let html=`<div class="section-title">${title}</div>
<div class="data-grid">
<div class="data-item">Balance: $${fmt(endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(closedTF)}</div>
<div class="data-item">Growth: ${growthTF.toFixed(2)}%</div>
<div class="data-item">Track Record: ${duration} days</div>
</div>`;

if(type==="30"||type==="60"||type==="90"){
html+=generateNarrative(start,end,type);
}

document.getElementById("breakdown").innerHTML=html;

ghlText=`${title}

Balance: $${fmt(endBal)}
Closed Profit: $${fmt(closedTF)}
Growth: ${growthTF.toFixed(2)}%
Track Record: ${duration} days`;

lastStats={title,endBal,closedTF,growthTF,duration};
}

function run(type){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date(start);
end.setDate(end.getDate()+(Number(type)-1));

processResult(start,end,`${type} Days`,type);
}

function runDetailed(){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date();
end.setDate(end.getDate()-1);

processResult(start,end,"Detailed Review","detailed");
}

function copyNote(){
if(!ghlText) return alert("Run first");
navigator.clipboard.writeText(ghlText);
alert("Copied");
}

function copyEmail(){

if(!lastStats.title) return alert("Run a report first");

let email=`Hi there,

Here is a performance update for the ${lastStats.title} period.

The account stands at $${fmt(lastStats.endBal)} with a closed result of $${fmt(lastStats.closedTF)}, reflecting ${lastStats.growthTF.toFixed(2)}% over ${lastStats.duration} days.

Performance remains dependent on market conditions. Periods of drawdown and recovery are expected.

Best regards`;

navigator.clipboard.writeText(email);
alert("Email copied");
}

function showWeekly(){
document.getElementById("weeklyBox").classList.remove("hidden");
}

</script>

</body>
</html>
