<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conan | Account Performance Checker</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  color: #000;
  padding: 30px;
}
.container {
  max-width: 1100px;
  margin: auto;
}
h1 {
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
}

.section {
  margin-top: 20px;
  padding: 20px;
  border: 1px solid #000;
}

</style>
</head>

<body>

<div class="container">
<h1>Conan<br>Account Performance Checker</h1>

<!-- INPUTS -->
<div>
  <input type="file" id="fileInput" accept=".csv">
  <br><br>

  Name:<br>
  <input type="text" id="name"><br>

  Software:<br>
  <input type="text" id="software"><br>

  Onboarding Date:<br>
  <input type="date" id="onboarding"><br>
</div>

<!-- BUTTONS -->
<div>
  <button onclick="run('weekly')">Weekly</button>
  <button onclick="run('30')">30 Days</button>
  <button onclick="run('60')">60 Days</button>
  <button onclick="run('90')">90 Days</button>
  <button onclick="run('outlook')">Outlook</button>
</div>

<!-- RESULT -->
<div id="result" class="section"></div>

</div>

<script>

let rows = [];

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  const headers = lines[1].split(",");

  return lines.slice(2).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

function loadFile(callback) {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Upload CSV");

  const reader = new FileReader();
  reader.onload = e => {
    rows = parseCSV(e.target.result);
    callback();
  };
  reader.readAsText(file);
}

function calcData(start, end) {

  let deposit = 0;
  let closedProfit = 0;
  let floating = 0;
  let firstClose = null;
  let funding = [];

  rows.forEach(r => {

    if (r.Type?.toLowerCase().includes("deposit") || r.Type?.toLowerCase().includes("withdraw")) {
      funding.push(`${r["Close date"]} → ${r["Net profit"]}`);
      deposit += Number(r["Net profit"]) || 0;
    }

    if (r.Type !== "Open position" && r["Close date"]) {
      let d = new Date(r["Close date"]);
      let profit = Number(r["Net profit"]) || 0;

      if (!firstClose) firstClose = r["Close date"];

      if (!start || (d >= start && d <= end)) {
        closedProfit += profit;
      }
    }

    if (r.Type === "Open position") {
      floating += Number(r["Net profit"]) || 0;
    }

  });

  let balance = deposit + closedProfit;
  let totalReturn = balance - deposit;
  let percent = deposit ? (totalReturn / deposit) * 100 : 0;

  return {
    deposit,
    balance,
    totalReturn,
    percent,
    closedProfit,
    floating,
    firstClose,
    funding
  };
}

function run(type) {

  loadFile(() => {

    const name = document.getElementById("name").value;
    const software = document.getElementById("software").value;
    const onboard = new Date(document.getElementById("onboarding").value);

    let start, end = new Date();

    if (type === "weekly") {
      start = new Date();
      start.setDate(start.getDate() - 7);
    }

    if (type === "30") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 30);
    }

    if (type === "60") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 60);
    }

    if (type === "90") {
      start = onboard;
      end = new Date(onboard);
      end.setDate(end.getDate() + 90);
    }

    let data = calcData(start, end);

    let paragraph = "";

    if (type === "weekly") {
      paragraph = `Over the selected weekly period, the account delivered a closed performance of ${data.closedProfit.toFixed(2)}, reflecting short-term trading behavior and recent execution efficiency.`;
    }

    if (type === "30") {
      paragraph = `During the first 30 days from onboarding, the account produced a return of ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%). This phase typically reflects initial system adaptation and early-stage performance expectations.`;
    }

    if (type === "60") {
      paragraph = `Comparing the 30-day and 60-day performance window, the account shows developing consistency. Current total return stands at ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%), indicating performance progression and stability trends.`;
    }

    if (type === "90") {
      paragraph = `Across the full 90-day cycle, the account demonstrates overall system behavior, including growth phases and drawdowns. Total return is ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%).`;
    }

    if (type === "outlook") {
      paragraph = `Based on historical performance, the account shows a projected trajectory aligned with its current profitability and consistency levels. While fluctuations remain part of trading, the system indicates a realistic growth potential moving forward.`;
    }

    let trackDays = Math.floor((new Date() - onboard) / (1000*60*60*24));

    document.getElementById("result").innerHTML = `
      <b>Name:</b> ${name}<br>
      <b>Software:</b> ${software}<br>
      <b>Onboarding Date:</b> ${document.getElementById("onboarding").value}<br><br>

      <b>Total Return:</b> ${data.totalReturn.toFixed(2)} (${data.percent.toFixed(2)}%)<br>
      <b>Track Record:</b> ${trackDays} days<br>
      <b>Closed Profit:</b> ${data.closedProfit.toFixed(2)}<br>
      <b>Floating P/L:</b> ${data.floating.toFixed(2)}<br>
      <b>First Trade Close:</b> ${data.firstClose || "N/A"}<br>

      <b>Funding Activity:</b><br>
      ${data.funding.join("<br>") || "None"}<br><br>

      <p>${paragraph}</p>
    `;

  });

}

</script>

</body>
</html>
