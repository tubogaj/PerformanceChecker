<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
  background: #f4f4f5;
  color: #111;
  padding: 50px;
}
.container { max-width: 1100px; margin: auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 24px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 95px; }

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.08);
  background: #fff;
  margin: 6px;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #fff;
  cursor: pointer;
}
button:hover { background: #333; }

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #666;
  margin-bottom: 14px;
  text-transform: uppercase;
}

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 14px;
}

.data-item {
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.05);
}

.data-label { font-size: 12px; color: #777; }
.data-value { font-size: 18px; font-weight: 600; }

#weeklyRange {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.05);
}

.funding {
  margin-top: 15px;
  font-size: 13px;
  color: #444;
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">
<input type="file" id="fileInput" accept=".csv"><br>

<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<div id="weeklyRange" style="display:none;">
Start: <input type="date" id="weekStart">
End: <input type="date" id="weekEnd">
</div>

<br><br>

<button onclick="run('weekly')">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="copyNote()">Copy to GHL Note</button>
</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");

  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function loadFile(cb){
  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Upload CSV");

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    cb();
  };
  reader.readAsText(file);
}

function filterRows(type,start,end){
  return rows.filter(r=>{
    let d=new Date(r["Close date"]);
    return r.Type===type && d>=start && d<=end;
  });
}

function sum(rows){
  return rows.reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

function getFirstClose(onboard){
  let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard);
  trades.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]));
  return trades[0];
}

function run(type){

loadFile(()=>{

const software=document.getElementById("software").value||"N/A";
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return alert("No trades");

let firstDate=new Date(first["Close date"]);
let today=new Date();

// ===== ACCOUNT DETAILS =====
let closedTotal=sum(filterRows("Closed position",onboard,today));
let depTotal=sum(filterRows("Deposit",new Date("2000-01-01"),today));
let wdTotal=sum(filterRows("Withdrawal",new Date("2000-01-01"),today));

let balance=depTotal + closedTotal - wdTotal;
let floating=sum(rows.filter(r=>r.Type==="Open position"));

let initialDep=sum(filterRows("Deposit",new Date("2000-01-01"),onboard));
let growthVal=balance-initialDep;
let growthPct=initialDep?(growthVal/initialDep)*100:0;

let track=Math.floor((today-firstDate)/(1000*60*60*24));

document.getElementById("overview").innerHTML=`
<div class="section-title">Account Details</div>
<div class="data-grid">
<div class="data-item"><div class="data-label">Balance</div><div class="data-value">${balance.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closedTotal.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Floating</div><div class="data-value">${floating.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthPct.toFixed(2)}% (${growthVal.toFixed(2)})</div></div>
<div class="data-item"><div class="data-label">Track Record</div><div class="data-value">${track} days</div></div>
<div class="data-item"><div class="data-label">1st Trade Closed</div><div class="data-value">${firstDate.toLocaleDateString()}</div></div>
</div>
`;

// ===== TIMEFRAME =====
let start,end,title;

if(type==="weekly"){
document.getElementById("weeklyRange").style.display="block";
start=new Date(document.getElementById("weekStart").value);
end=new Date(document.getElementById("weekEnd").value);
title=`Weekly (${start.toLocaleDateString()} - ${end.toLocaleDateString()})`;
}else{
document.getElementById("weeklyRange").style.display="none";
let days=Number(type);
start=firstDate;
end=new Date(firstDate);
end.setDate(end.getDate()+days);
title=`${days} Days`;
}

// ===== PERFORMANCE =====
let closed=sum(filterRows("Closed position",start,end));
let dep=sum(filterRows("Deposit",start,end));
let wd=sum(filterRows("Withdrawal",start,end));

let bal=dep + closed - wd;
let growthValTF=bal - dep;
let growthPctTF=dep?(growthValTF/dep)*100:0;

// FUNDING LIST
let fundingRows=rows.filter(r=>{
  let d=new Date(r["Close date"]);
  return (r.Type==="Deposit" || r.Type==="Withdrawal") && d>=start && d<=end;
});

let fundingHTML = fundingRows.length
  ? fundingRows.map(r=>{
      let amt=Number(r["Net profit"])||0;
      let label=amt>=0?"Deposit":"Withdrawal";
      return `${r["Close date"]} → ${label} (${amt})`;
    }).join("<br>")
  : "None";

document.getElementById("breakdown").innerHTML=`
<div class="section-title">Account Performance (${title})</div>
<div class="data-grid">
<div class="data-item"><div class="data-label">Balance</div><div class="data-value">${bal.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Closed Profits</div><div class="data-value">${closed.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Floating</div><div class="data-value">${floating.toFixed(2)}</div></div>
<div class="data-item"><div class="data-label">Growth</div><div class="data-value">${growthPctTF.toFixed(2)}% (${growthValTF.toFixed(2)})</div></div>
</div>

<div class="funding">
<b>Funding Activity:</b><br>${fundingHTML}
</div>
`;

// ===== GHL =====
ghlText = `
Software: ${software}

--- ACCOUNT DETAILS ---
Balance: ${balance.toFixed(2)}
Closed Profits: ${closedTotal.toFixed(2)}
Floating: ${floating.toFixed(2)}
Growth: ${growthPct.toFixed(2)}% (${growthVal.toFixed(2)})
Track Record: ${track} days
1st Trade Closed: ${firstDate.toLocaleDateString()}

--- PERFORMANCE (${title}) ---
Balance: ${bal.toFixed(2)}
Closed Profits: ${closed.toFixed(2)}
Floating: ${floating.toFixed(2)}
Growth: ${growthPctTF.toFixed(2)}% (${growthValTF.toFixed(2)})

Funding:
${fundingHTML.replace(/<br>/g,"\n")}
`;

});

}

function copyNote(){
if(!ghlText) return alert("Run first");
navigator.clipboard.writeText(ghlText);
alert("Copied!");
}

</script>

</body>
</html>
