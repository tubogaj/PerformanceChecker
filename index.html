<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, 'Segoe UI';
  background: #f4f4f5;
  padding: 50px;
  color: #111;
}
.container { max-width:1100px;margin:auto; }
.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}
input {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:5px;
}
button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}
.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}
.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}
h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass">
<h2>Account Performance Checker</h2>
</div>

<div class="glass">
<input type="file" id="fileInput"><br>
<input type="date" id="onboarding">

<br>

<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];

const fmt = v => Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

document.getElementById("fileInput").addEventListener("change",init);
document.getElementById("onboarding").addEventListener("change",init);

function init(){
const file=document.getElementById("fileInput").files[0];
const onboard=document.getElementById("onboarding").value;
if(!file||!onboard) return;

const reader=new FileReader();
reader.onload=e=>{
rows=parseCSV(e.target.result);
renderAccount();
};
reader.readAsText(file);
}

function parseCSV(text){
const lines=text.split("\n").filter(l=>l.trim());
const headers=lines[1].split(",");
return lines.slice(2).map(l=>{
const v=l.split(",");
let o={};
headers.forEach((h,i)=>o[h.trim()]=v[i]?.trim());
return o;
});
}

function sum(a){return a.reduce((s,v)=>s+v,0);}
function get(c){return rows.filter(c).map(r=>Number(r["Net profit"])||0);}

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(d){
let dep=sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d));
let wd=sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d));
let cl=sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
return dep-wd+cl;
}

function analyzePeriod(start,end){

let trades=rows.filter(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end);

let profits=trades.map(r=>Number(r["Net profit"])||0);
let total=sum(profits);

let startBal=getBalanceAt(start);
let endBal=getBalanceAt(end);
let growth=startBal?(total/startBal)*100:0;

let running=0,peak=0,drawdown=false,maxDD=0;

profits.forEach(p=>{
running+=p;
if(running>peak) peak=running;
let dd = peak - running;
if(dd>0) drawdown=true;
if(dd>maxDD) maxDD=dd;
});

let recovered = running >= peak;

return {trades,total,startBal,endBal,growth,drawdown,recovered,maxDD};
}

// ===== COMMENTARY ENGINE =====
function generateNarrative(start,end,type){

let data = analyzePeriod(start,end);
let isProfit = data.total >= 0;

function behaviorText(){
if(!data.drawdown) return "The period showed relatively stable execution with minimal drawdown.";
if(data.drawdown && data.recovered) return "The account experienced drawdown followed by a recovery phase.";
return "The account is currently in a drawdown phase, with recovery still developing.";
}

function toneIntro(){
if(isProfit) return "The system delivered a positive result during this period.";
return "The system closed this period at a net loss.";
}

if(type==="30"){
return `
<div class="data-item">
${toneIntro()}

During the first 30 days, ${data.trades.length} trades were executed.

${behaviorText()}

The account closed at $${fmt(data.endBal)}, with a result of $${fmt(data.total)} (${data.growth.toFixed(2)}%).

This phase represents the system’s initial behavior, where fluctuations, including drawdown, are expected as positions develop.
</div>`;
}

if(type==="60"){

let mid=new Date(start);
mid.setDate(mid.getDate()+29);

let first30 = analyzePeriod(start,mid);
let next30 = analyzePeriod(mid,end);

return `
<div class="data-item">
${toneIntro()}

Comparing periods, the first 30 days produced $${fmt(first30.total)}, while the following 30 days resulted in $${fmt(next30.total)}.

This shows how the system has progressed as it continued operating.

The account now stands at $${fmt(data.endBal)}, reflecting ${data.growth.toFixed(2)}% overall performance.

${behaviorText()}

At this stage, it is common to see either stabilization after early volatility or continued drawdown before recovery develops.
</div>`;
}

if(type==="90"){
return `
<div class="data-item">
${toneIntro()}

Over the 90-day period, the system has gone through multiple market phases, including both favorable and unfavorable conditions.

The account stands at $${fmt(data.endBal)}, with a total result of $${fmt(data.total)} (${data.growth.toFixed(2)}%).

${behaviorText()}

This longer duration provides a clearer view of system behavior, where early-stage volatility transitions into more observable performance patterns.

Whether in profit or drawdown, the results reflect the system’s natural cycle of fluctuation, execution, and potential recovery over time.
</div>`;
}

}

// ===== RUN =====
function run(type){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date(start);
end.setDate(end.getDate()+(Number(type)-1));

let data = analyzePeriod(start,end);

let html=`
<div class="section-title">${type} Day Performance</div>

<div class="data-grid">
<div class="data-item">Balance: $${fmt(data.endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(data.total)}</div>
<div class="data-item">Growth: ${data.growth.toFixed(2)}%</div>
<div class="data-item">Track Record: ${type} days</div>
</div>

<div style="margin-top:20px"></div>

<div class="section-title">Commentary</div>
${generateNarrative(start,end,type)}
`;

document.getElementById("breakdown").innerHTML=html;
}

// ===== OVERVIEW =====
function renderAccount(){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let firstClose=new Date(first["Close date"]);
let lastActivity=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let duration=Math.floor((lastActivity-firstClose)/(1000*60*60*24))+1;

let endBal=getBalanceAt(lastActivity);
let closed=sum(get(r=>r.Type==="Closed position"));

document.getElementById("overview").innerHTML=`
<div class="section-title">Overview</div>

<div class="data-grid">
<div class="data-item">Balance<br><h2>$${fmt(endBal)}</h2></div>
<div class="data-item">Closed Profit<br>$${fmt(closed)}</div>
<div class="data-item">Track Record<br>${duration} days</div>
</div>
`;
}

</script>

</body>
</html>
