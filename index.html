<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, 'Segoe UI';
  background: #f4f4f5;
  padding: 50px;
  color: #111;
}
.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex;justify-content:space-between;align-items:center; }
.logo { height:90px; }

input {
  padding:10px;border-radius:8px;border:1px solid #ddd;margin:5px;
}

button {
  padding:10px 16px;
  border:none;border-radius:8px;
  background:#111;color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.hidden { display:none; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">

<input type="file" id="fileInput" accept=".csv"><br>
<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<!-- Weekly cleaner UI -->
<div id="weeklyBox" class="hidden">
  <input type="date" id="weekStart">
  <input type="date" id="weekEnd">
  <button onclick="run('weekly')">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="copyNote()">Copy GHL</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";

// AUTO LOAD
document.getElementById("fileInput").addEventListener("change",loadAndInit);
document.getElementById("onboarding").addEventListener("change",loadAndInit);

function loadAndInit(){
  const file=document.getElementById("fileInput").files[0];
  const onboard=document.getElementById("onboarding").value;
  if(!file || !onboard) return;

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    renderAccount();
  };
  reader.readAsText(file);
}

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");
  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function sum(arr){ return arr.reduce((s,v)=>s+v,0); }

function get(type,cond){
  return rows.filter(cond).map(r=>Number(r["Net profit"])||0);
}

function getFirstClose(onboard){
  return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard)
    .sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

// ===== ACCOUNT DETAILS AUTO =====
function renderAccount(){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let dep=sum(get("Deposit",r=>r.Type==="Deposit"));
let wd=sum(get("Withdrawal",r=>r.Type==="Withdrawal"));
let closed=sum(get("Closed",r=>r.Type==="Closed position"));
let floating=sum(get("Open",r=>r.Type==="Open position"));

let bal=dep-wd+closed;
let growth=dep?(closed/dep)*100:0;

document.getElementById("overview").innerHTML=`
<div class="section-title">Account Details</div>
<div class="data-grid">
<div class="data-item">Balance: ${bal.toFixed(2)}</div>
<div class="data-item">Closed: ${closed.toFixed(2)}</div>
<div class="data-item">Floating: ${floating.toFixed(2)}</div>
<div class="data-item">Growth: ${growth.toFixed(2)}%</div>
<div class="data-item">1st Trade: ${new Date(first["Close date"]).toLocaleDateString()}</div>
</div>
`;
}

// ===== WEEKLY UI =====
function showWeekly(){
  document.getElementById("weeklyBox").classList.remove("hidden");
}

// ===== PERFORMANCE =====
function run(type){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start,end,title;

if(type==="weekly"){
  start=new Date(document.getElementById("weekStart").value);
  end=new Date(document.getElementById("weekEnd").value);

  if(!start || !end) return alert("Select dates");

  title=`Weekly`;
}else{
  document.getElementById("weeklyBox").classList.add("hidden");

  let days=Number(type);
  start=new Date(first["Close date"]);
  end=new Date(start);
  end.setDate(end.getDate()+(days-1));
  title=`${days} Days`;
}

// SNAPSHOT
let dep=sum(get("d",r=>r.Type==="Deposit" && new Date(r["Close date"])<=end));
let wd=sum(get("w",r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=end));
let closedTotal=sum(get("c",r=>r.Type==="Closed position" && new Date(r["Close date"])<=end));

let bal=dep-wd+closedTotal;

// PERIOD PROFIT
let closedTF=sum(get("c2",r=>r.Type==="Closed position" && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));

document.getElementById("breakdown").innerHTML=`
<div class="section-title">Performance (${title})</div>
<div class="data-grid">
<div class="data-item">Balance: ${bal.toFixed(2)}</div>
<div class="data-item">Closed Profit: ${closedTF.toFixed(2)}</div>
</div>
`;

ghlText=`Software: ${document.getElementById("software").value}

Balance: ${bal.toFixed(2)}
Closed: ${closedTF.toFixed(2)}
`;
}

// COPY
function copyNote(){
  if(!ghlText) return alert("Run first");
  navigator.clipboard.writeText(ghlText);
  alert("Copied");
}

</script>

</body>
</html>
