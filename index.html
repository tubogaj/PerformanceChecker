<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Account Performance Checker</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  padding: 40px;
}
.container { max-width: 1200px; margin: auto; }

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 90px; }

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  margin: 5px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
}
button:hover { background: rgba(255,255,255,0.25); }

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">
  <input type="file" id="fileInput" accept=".csv"><br>
  <input type="text" id="name" placeholder="Client Name">
  <input type="text" id="software" placeholder="Software">
  <input type="date" id="onboarding">

  <div id="weeklyRange" style="display:none;">
    Start: <input type="date" id="weekStart">
    End: <input type="date" id="weekEnd">
  </div>

  <br>
  <button onclick="run('weekly')">Weekly</button>
  <button onclick="run('30')">30 Days</button>
  <button onclick="run('60')">60 Days</button>
  <button onclick="run('90')">90 Days</button>
</div>

<div id="result" class="glass"></div>
<div id="monthlyTable" class="glass"></div>

</div>

<script>

let rows = [];

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  const headers = lines[1].split(",");

  return lines.slice(2).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

function loadFile(cb){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Upload CSV");

  const reader = new FileReader();
  reader.onload = e=>{
    rows = parseCSV(e.target.result).sort((a,b)=> new Date(a["Close date"]) - new Date(b["Close date"]));
    cb();
  };
  reader.readAsText(file);
}

// ===== CORRECT TIMELINE =====
function buildTimeline(onboard){

  let totalDeposit = 0;
  let cumulativeProfit = 0;
  let timeline = [];

  rows.forEach(r=>{

    let d = new Date(r["Close date"]);
    let profit = Number(r["Net profit"]) || 0;
    let type = r.Type?.toLowerCase() || "";

    if(d < onboard) return;

    if(type.includes("deposit")){
      totalDeposit += profit;
    }

    if(r.Type !== "Open position" && !type.includes("deposit") && !type.includes("withdraw")){
      cumulativeProfit += profit;
    }

    let balance = totalDeposit + cumulativeProfit;

    timeline.push({ date:d, balance });
  });

  return { timeline, totalDeposit };
}

function getBalanceAt(timeline, target){
  let b = 0;
  timeline.forEach(t=>{
    if(t.date <= target) b = t.balance;
  });
  return b;
}

function getFloating(){
  return rows.filter(r=>r.Type==="Open position")
             .reduce((s,r)=>s+(Number(r["Net profit"])||0),0);
}

// ===== MONTHLY =====
function calcMonthly(onboard){

  let balance = 0;
  let months = {};

  rows.forEach(r=>{
    let d=new Date(r["Close date"]);
    if(d<onboard || r.Type==="Open position") return;

    let p=Number(r["Net profit"])||0;
    let type=r.Type?.toLowerCase()||"";

    if(type.includes("deposit")) balance += p;
    if(!type.includes("deposit") && !type.includes("withdraw")) balance += p;

    let key=`${d.getFullYear()}-${d.getMonth()+1}`;

    if(!months[key]){
      months[key]={start:balance-p,end:balance,peak:balance,maxDD:0,wins:0,trades:0};
    }

    let m=months[key];

    if(balance>m.peak) m.peak=balance;
    let dd=((m.peak-balance)/m.peak)*100;
    if(dd>m.maxDD) m.maxDD=dd;

    if(!type.includes("deposit") && !type.includes("withdraw")){
      m.trades++;
      if(p>0) m.wins++;
    }

    m.end=balance;
  });

  let html=`<h3>Monthly Performance</h3><table>
  <tr><th>Month</th><th>Start</th><th>End</th><th>Profit</th><th>%</th><th>Max DD</th><th>Win Rate</th></tr>`;

  Object.keys(months).forEach(k=>{
    let m=months[k];
    let profit=m.end-m.start;
    let pct=m.start? (profit/m.start)*100:0;
    let wr=m.trades? (m.wins/m.trades)*100:0;

    html+=`<tr>
      <td>${k}</td>
      <td>${m.start.toFixed(2)}</td>
      <td>${m.end.toFixed(2)}</td>
      <td>${profit.toFixed(2)}</td>
      <td>${pct.toFixed(2)}%</td>
      <td>${m.maxDD.toFixed(2)}%</td>
      <td>${wr.toFixed(2)}%</td>
    </tr>`;
  });

  html+=`</table>`;
  document.getElementById("monthlyTable").innerHTML=html;
}

// ===== MAIN =====
function run(type){

loadFile(()=>{

  const onboard = new Date(document.getElementById("onboarding").value);
  const first = rows.find(r => new Date(r["Close date"]) >= onboard && r.Type !== "Open position");

  if(!first) return alert("No trades");

  let firstDate = new Date(first["Close date"]);

  let { timeline, totalDeposit } = buildTimeline(onboard);
  let floating = getFloating();
  let today = new Date();

  if(type==="weekly"){

    let currentBalance = getBalanceAt(timeline, today);
    let growth = totalDeposit ? ((currentBalance-totalDeposit)/totalDeposit)*100:0;
    let track = Math.floor((today-firstDate)/(1000*60*60*24));

    document.getElementById("result").innerHTML=`
    <b>Track Record:</b> ${track} days<br>
    <b>Balance:</b> ${currentBalance.toFixed(2)}<br>
    <b>Deposit:</b> ${totalDeposit.toFixed(2)}<br>
    <b>Growth:</b> ${growth.toFixed(2)}%<br>
    <b>Floating:</b> ${floating.toFixed(2)}
    `;
  }

  if(type==="30"||type==="60"||type==="90"){

    let days = Number(type);
    let end = new Date(firstDate);
    end.setDate(firstDate.getDate()+days);

    let startBal = getBalanceAt(timeline, firstDate);
    let endBal = getBalanceAt(timeline, end);

    let profit = endBal-startBal;
    let growth = startBal? (profit/startBal)*100:0;
    let track = Math.floor((end-firstDate)/(1000*60*60*24));

    let extra="";

    if(type==="60"){
      let end30=new Date(firstDate); end30.setDate(firstDate.getDate()+30);
      let bal30=getBalanceAt(timeline,end30);
      let g30=startBal?((bal30-startBal)/startBal)*100:0;
      extra=`<br><b>30d vs 60d:</b> ${g30.toFixed(2)}% → ${growth.toFixed(2)}%`;
    }

    if(type==="90"){
      extra=`<br><b>Overall Growth:</b> ${growth.toFixed(2)}%`;
    }

    document.getElementById("result").innerHTML=`
    <b>Track Record:</b> ${track} days<br>
    <b>Start Balance:</b> ${startBal.toFixed(2)}<br>
    <b>End Balance:</b> ${endBal.toFixed(2)}<br>
    <b>Closed Profit:</b> ${profit.toFixed(2)}<br>
    <b>Growth:</b> ${growth.toFixed(2)}%<br>
    <b>Floating:</b> ${floating.toFixed(2)}
    ${extra}
    `;
  }

  calcMonthly(onboard);

});

}

</script>

</body>
</html>
