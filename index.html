const fmt=v=>Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

fileInput.onchange=init;
onboarding.onchange=init;
software.onchange=renderAccount;

function init(){

  const file = fileInput.files[0];
  const onboard = onboarding.value;

  if(!file){
    alert("Upload CSV first");
    return;
  }

  if(!onboard){
    alert("Select onboarding date");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    rows = parseCSV(e.target.result);
    renderAccount();
  };

  reader.readAsText(file);
}

function parseCSV(t){
const l=t.split("\n").filter(x=>x.trim());
const h=l[1].split(",");
return l.slice(2).map(x=>{
const v=x.split(","), o={};
h.forEach((k,i)=>o[k.trim()]=v[i]?.trim());
return o;
});
}

const sum=a=>a.reduce((s,v)=>s+v,0);
const get=c=>rows.filter(c).map(r=>+r["Net profit"]||0);

function getFirstClose(o){
return rows
  .filter(r => 
    (r.Type || "").toLowerCase().includes("closed") &&
    new Date(r["Close date"]) >= o
  )
  .sort((a,b)=>new Date(a["Close date"]) - new Date(b["Close date"]))[0];
}

function getLastActivity(){
return new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
}

function getBalanceAt(d){
return sum(get(r=>(r.Type || "").toLowerCase().includes("deposit") && new Date(r["Close date"])<=d))
- sum(get(r=>(r.Type || "").toLowerCase().includes("withdraw") && new Date(r["Close date"])<=d))
+ sum(get(r=>(r.Type || "").toLowerCase().includes("closed") && new Date(r["Close date"])<=d));
}

function getFloatingPL(){
return sum(rows.filter(r=>(r.Type || "").toLowerCase().includes("open")).map(r=>+r["Net profit"]||0));
}

function getTotalCapital(onboardDate){

let o = new Date(onboardDate);

// ✅ 1. BALANCE BEFORE OR ON ONBOARDING
let startingBalance =
  sum(get(r=>(r.Type || "").toLowerCase().includes("deposit") && new Date(r["Close date"])<=o))
- sum(get(r=>(r.Type || "").toLowerCase().includes("withdraw") && new Date(r["Close date"])<=o))
+ sum(get(r=>(r.Type || "").toLowerCase().includes("closed") && new Date(r["Close date"])<=o));

// ✅ 2. DEPOSITS AFTER ONBOARDING
let depositsAfter =
  sum(get(r=>(r.Type || "").toLowerCase().includes("deposit") && +r["Net profit"]>0 && new Date(r["Close date"])>o));

// ✅ 3. WITHDRAWALS AFTER ONBOARDING
let withdrawalsAfter =
  sum(get(r=>((r.Type || "").toLowerCase().includes("withdraw") || ((r.Type || "").toLowerCase().includes("deposit") && +r["Net profit"]<0)) && new Date(r["Close date"])>o));

// ✅ FINAL
return startingBalance + depositsAfter - Math.abs(withdrawalsAfter);
}

function analyze(start,end){
let trades=rows.filter(r=>(r.Type || "").toLowerCase().includes("closed") && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end);
let total=sum(trades.map(r=>+r["Net profit"]||0));
let startBal=getBalanceAt(start);
return { total, endBal:getBalanceAt(end), growth:startBal?(total/startBal)*100:0 };
}

function loadGuide(type){

  document.getElementById("guideContent").innerHTML = guideData[type];

  document.querySelectorAll(".guide-menu div")
    .forEach(el => el.classList.remove("active"));

  let activeBtn = document.querySelector(`[onclick="loadGuide('${type}')"]`);
  if(activeBtn) activeBtn.classList.add("active");

  if(type==="calc"){
    let system = document.getElementById("software").value;
    if(system){
      document.getElementById("systemGuideText").innerText = systemNarrative(system);
    }
  }
}

 function searchGuide(){

  let highlighted = content.innerHTML.replace(

${deposits>0 ? `During this timeframe, a total deposit of $${fmt(deposits)} was added to the account.` : ""}
${Math.abs(withdrawals)>0 ? `A total withdrawal of $${fmt(Math.abs(withdrawals))} was made during this period.` : ""}

As trading activity progressed, the account experienced fluctuations, reaching a low of $${fmt(lowest)} on ${lowestObj.dt.toLocaleDateString()}, representing a drawdown of ${ddPct.toFixed(2)}%.

${recovered
? `Following this decline, the account demonstrated recovery, regaining strength and stabilizing above its lower levels.`
: `The account has not yet fully recovered from this drawdown phase.`}

As of the last recorded activity on ${lastDate.toLocaleDateString()}, the account balance stands at $${fmt(finalBal)}.

Overall, the system generated a total closed profit of $${fmt(d.total)}, resulting in a growth of ${growthPct.toFixed(2)}% over the period.

This performance illustrates how the system navigates changing market conditions, adapting through both drawdown and recovery phases.

</div>`;
}

// ===== COPY =====
function copyNote(){

  // ===== DETECT TYPE =====
  let hasSummary = document.querySelector("#breakdown .section-title");

  // ===== GET MAIN METRICS =====
  let items = document.querySelectorAll("#breakdown .data-item");

  let data = {};

  items.forEach(item => {
    let lines = item.innerText.split("\n").map(x => x.trim()).filter(Boolean);
    if(lines.length >= 2){
      data[lines[0]] = lines[1];
    }
  });

  // ===== GET TRACK RECORD (if exists) =====
let track = "";

let allItems = document.querySelectorAll("#breakdown .data-item");

allItems.forEach(item => {
  let lines = item.innerText.split("\n").map(x => x.trim()).filter(Boolean);
  if(lines[0] === "Track Record" && lines[1]){
    track = lines[1];
  }
});

  // ===== BUILD OUTPUT =====
  let output =
`System: ${data["System"] || ""}
Balance: ${data["Balance"] || ""}
Closed Profit: ${data["Closed Profit"] || ""}
Floating P/L: ${data["Floating P/L"] || ""}
Growth: ${data["Growth"] || ""}
Track Record: ${track}`;

  // ===== ADD SUMMARY ONLY IF EXISTS (NOT WEEKLY) =====
  if(hasSummary){
    let summaryText = document.querySelector("#breakdown .section-title + .data-item");

    if(summaryText){
      output += `

Performance Summary:

${summaryText.innerText.trim()}`;
    }
  }

  // ===== COPY =====
  navigator.clipboard.writeText(output);
  alert("Copied clean for GHL");
}
