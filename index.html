<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Account Performance Checker</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  padding: 40px;
}
.container {
  max-width: 1200px;
  margin: auto;
}
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 20px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo { height: 90px; }
.inputs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 12px;
}
input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}
button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
}
button:hover { background: rgba(255,255,255,0.25); }
.buttons { margin-top: 15px; display: flex; gap: 10px; }
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">
  <input type="file" id="fileInput" accept=".csv"><br><br>

  <div class="inputs">
    <input type="text" id="name" placeholder="Client Name">
    <input type="text" id="software" placeholder="Software">
    <input type="date" id="onboarding">
  </div>

  <div id="weeklyRange" style="display:none; margin-top:10px;">
    Start: <input type="date" id="weekStart">
    End: <input type="date" id="weekEnd">
  </div>

  <div class="buttons">
    <button onclick="run('weekly')">Weekly</button>
    <button onclick="run('30')">30 Days</button>
    <button onclick="run('60')">60 Days</button>
    <button onclick="run('90')">90 Days</button>
  </div>
</div>

<div id="result" class="glass"></div>
<div id="monthlyTable" class="glass"></div>

</div>

<script>

let rows = [];

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  const headers = lines[1].split(",");

  return lines.slice(2).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

function loadFile(callback) {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Upload CSV");

  const reader = new FileReader();
  reader.onload = e => {
    rows = parseCSV(e.target.result);
    callback();
  };
  reader.readAsText(file);
}

// ===== MONTHLY TRUE TRACKING + DRAWNDOWN + WINRATE =====
function calcMonthly(onboard) {

  let balance = 0;
  let months = {};

  let sorted = [...rows].sort((a,b)=> new Date(a["Close date"]) - new Date(b["Close date"]));

  sorted.forEach(r => {

    let d = new Date(r["Close date"]);
    if (isNaN(d) || d < onboard || r.Type === "Open position") return;

    let profit = Number(r["Net profit"]) || 0;
    let key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

    if (!months[key]) {
      months[key] = {
        start: balance,
        end: 0,
        peak: balance,
        maxDD: 0,
        wins: 0,
        trades: 0
      };
    }

    balance += profit;

    let m = months[key];

    // TRACK PEAK & DD
    if (balance > m.peak) m.peak = balance;

    let dd = ((m.peak - balance) / m.peak) * 100;
    if (dd > m.maxDD) m.maxDD = dd;

    // WIN RATE
    m.trades++;
    if (profit > 0) m.wins++;

    m.end = balance;

  });

  let html = `
  <h3>Monthly Performance</h3>
  <table>
  <tr>
    <th>Month</th>
    <th>Start</th>
    <th>End</th>
    <th>Profit</th>
    <th>Growth %</th>
    <th>Max DD %</th>
    <th>Win Rate %</th>
  </tr>`;

  Object.keys(months).forEach(k => {

    let m = months[k];
    let profit = m.end - m.start;
    let pct = m.start ? (profit / m.start) * 100 : 0;
    let winrate = m.trades ? (m.wins / m.trades) * 100 : 0;

    html += `
    <tr>
      <td>${k}</td>
      <td>${m.start.toFixed(2)}</td>
      <td>${m.end.toFixed(2)}</td>
      <td>${profit.toFixed(2)}</td>
      <td>${pct.toFixed(2)}%</td>
      <td>${m.maxDD.toFixed(2)}%</td>
      <td>${winrate.toFixed(2)}%</td>
    </tr>`;
  });

  html += `</table>`;
  document.getElementById("monthlyTable").innerHTML = html;
}

// ===== CORE CALC =====
function calcData(start, end, onboard) {

  let closed = 0, floating = 0, deposit = 0, balance = 0, funding=[];

  rows.sort((a,b)=> new Date(a["Close date"]) - new Date(b["Close date"]));

  rows.forEach(r=>{
    let d=new Date(r["Close date"]);
    let p=Number(r["Net profit"])||0;
    let t=r.Type?.toLowerCase()||"";

    if(d>=onboard && r.Type!=="Open position") balance+=p;
    if(t.includes("deposit") && d>=onboard) deposit+=p;

    if((t.includes("deposit")||t.includes("withdraw")) && d>=start && d<=end){
      let label=t.includes("deposit")?"Deposit":"Withdrawal";
      funding.push(`${r["Close date"]} → ${label} (${p}) → Balance: ${balance.toFixed(2)}`);
    }

    if(r.Type!=="Open position" && d>=start && d<=end) closed+=p;
    if(r.Type==="Open position") floating+=p;
  });

  let total=0;
  rows.forEach(r=>{
    let d=new Date(r["Close date"]);
    let p=Number(r["Net profit"])||0;
    if(d>=onboard && d<=end && r.Type!=="Open position") total+=p;
  });

  let pct = deposit ? (total/deposit)*100 : 0;

  return { total, pct, closed, floating, funding };
}

// ===== RUN =====
function run(type){

  loadFile(()=>{

    const onboard=new Date(document.getElementById("onboarding").value);
    let start,end;

    if(type==="weekly"){
      document.getElementById("weeklyRange").style.display="block";
      start=new Date(document.getElementById("weekStart").value);
      end=new Date(document.getElementById("weekEnd").value);
    } else {
      document.getElementById("weeklyRange").style.display="none";
    }

    if(type==="30"){ start=onboard; end=new Date(onboard); end.setDate(end.getDate()+30); }
    if(type==="60"){ start=onboard; end=new Date(onboard); end.setDate(end.getDate()+60); }
    if(type==="90"){ start=onboard; end=new Date(onboard); end.setDate(end.getDate()+90); }

    let d=calcData(start,end,onboard);

    let state = d.closed>=0 ? "winning" : "drawdown";

    let narrative = state==="winning"
      ? `The account is currently showing strong performance, maintaining positive returns and demonstrating consistency in execution.`
      : `The account is undergoing a drawdown phase, reflecting temporary market pressure. This remains within expected trading behavior.`

    document.getElementById("result").innerHTML=`
      <b>Total Return:</b> ${d.total.toFixed(2)} (${d.pct.toFixed(2)}%)<br>
      <b>Closed Profit:</b> ${d.closed.toFixed(2)}<br>
      <b>Floating:</b> ${d.floating.toFixed(2)}<br><br>
      <b>Funding:</b><br>${d.funding.join("<br>")||"None"}<br><br>
      <p>${narrative}</p>
    `;

    calcMonthly(onboard);

  });
}

</script>

</body>
</html>
