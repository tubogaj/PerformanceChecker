<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body {
  font-family: -apple-system, 'Segoe UI';
  background: #f4f4f5;
  padding: 50px;
  color: #111;
}

.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex;justify-content:space-between;align-items:center; }

input {
  padding:10px;border-radius:8px;border:1px solid #ddd;margin:5px;
}

button {
  padding:10px 16px;
  border:none;border-radius:8px;
  background:#111;color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.hidden { display:none; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

.note {
  font-size:12px;
  color:#777;
  margin-top:10px;
}

h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
</div>

<div class="glass">

<input type="file" id="fileInput" accept=".csv"><br>
<input type="text" id="software" placeholder="Software">
<input type="date" id="onboarding">

<div id="weeklyBox" class="hidden">
  <input type="date" id="weekStart">
  <input type="date" id="weekEnd">
  <button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="runDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

let rows=[];
let ghlText="";
let lastStats={};

const fmt = (v) => Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

document.getElementById("fileInput").addEventListener("change",init);
document.getElementById("onboarding").addEventListener("change",init);

function init(){
  const file=document.getElementById("fileInput").files[0];
  const onboard=document.getElementById("onboarding").value;

  if(!file || !onboard) return;

  const reader=new FileReader();
  reader.onload=e=>{
    rows=parseCSV(e.target.result);
    renderAccount(); // ✅ autopopulate FIXED
  };
  reader.readAsText(file);
}

function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[1].split(",");
  return lines.slice(2).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=values[i]?.trim());
    return obj;
  });
}

function sum(arr){ return arr.reduce((s,v)=>s+v,0); }

function get(cond){
  return rows.filter(cond).map(r=>Number(r["Net profit"])||0);
}

function getFirstClose(onboard){
  return rows
    .filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=onboard)
    .sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(date){
  let dep=sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=date));
  let wd=sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=date));
  let closed=sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=date));
  return dep-wd+closed;
}

function renderAccount(){

const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let startDate=new Date(first["Close date"]);
let endDate=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let endBal=getBalanceAt(endDate);
let closed=sum(get(r=>r.Type==="Closed position"));

let growth = (closed/getBalanceAt(startDate))*100;

document.getElementById("overview").innerHTML=`
<div class="section-title">Overview</div>

<div class="data-grid">
<div class="data-item"><div class="section-title">Balance</div><h2>$${fmt(endBal)}</h2></div>
<div class="data-item"><div class="section-title">Growth</div><h2>${growth.toFixed(2)}%</h2></div>
<div class="data-item"><div class="section-title">Closed Profit</div><strong>$${fmt(closed)}</strong></div>
</div>
`;
}

// ===== ADAPTIVE COMMENTARY =====
function generateNarrative(start,end,type){

let profits=get(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end);

let total=sum(profits);

let startBal=getBalanceAt(start);
let endBal=getBalanceAt(end);
let growth=startBal?(total/startBal)*100:0;

let tone = total>0
? "The account closed the period in profit."
: total<0
? "The account closed at a net loss due to market conditions."
: "The account remained near break-even.";

return `
<div style="margin-top:20px">
<div class="section-title">${type} Day Commentary</div>
<div class="data-item">
${tone}

Closed: $${fmt(total)}  
Balance: $${fmt(endBal)}  
Growth: ${growth.toFixed(2)}%

Performance remains dependent on market conditions.
</div></div>`;
}

// ===== ENGINE =====
function processResult(start,end,title,type){

let endBal=getBalanceAt(end);
let closedTF=sum(get(r=>r.Type==="Closed position" &&
new Date(r["Close date"])>=start &&
new Date(r["Close date"])<=end));

let startBal=getBalanceAt(start);
let growthTF=startBal?(closedTF/startBal)*100:0;

let html=`<div class="section-title">${title}</div>
<div class="data-grid">
<div class="data-item">Balance: $${fmt(endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(closedTF)}</div>
<div class="data-item">Growth: ${growthTF.toFixed(2)}%</div>
</div>`;

if(type==="30"||type==="60"||type==="90"){
html+=generateNarrative(start,end,type);
}

document.getElementById("breakdown").innerHTML=html;

ghlText=`${title}
Balance: $${fmt(endBal)}
Closed Profit: $${fmt(closedTF)}
Growth: ${growthTF.toFixed(2)}%`;

lastStats={title,endBal,closedTF,growthTF};
}

// ===== BUTTON FIXES =====
function run(type){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return alert("Upload file + onboarding");

let start=new Date(first["Close date"]);
let end=new Date(start);
end.setDate(end.getDate()+(Number(type)-1));

processResult(start,end,`${type} Days`,type);
}

function runWeekly(){
let start=new Date(document.getElementById("weekStart").value);
let end=new Date(document.getElementById("weekEnd").value);

if(!start || !end) return alert("Select dates");

processResult(start,end,"Weekly","weekly");
}

function runDetailed(){
const onboard=new Date(document.getElementById("onboarding").value);
const first=getFirstClose(onboard);
if(!first) return;

let start=new Date(first["Close date"]);
let end=new Date();

processResult(start,end,"Detailed Review","detailed");
}

function copyNote(){
if(!ghlText) return alert("Run first");
navigator.clipboard.writeText(ghlText);
alert("Copied");
}

function copyEmail(){
if(!lastStats.title) return alert("Run report first");

let email=`Hi,

Update for ${lastStats.title}:

Balance: $${fmt(lastStats.endBal)}
Closed Profit: $${fmt(lastStats.closedTF)}
Growth: ${lastStats.growthTF.toFixed(2)}%

Performance depends on market conditions.

Best regards`;

navigator.clipboard.writeText(email);
alert("Copied");
}

function showWeekly(){
document.getElementById("weeklyBox").classList.remove("hidden");
}

</script>

</body>
</html>
