<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body { font-family:-apple-system,'Segoe UI'; background:#f4f4f5; padding:50px; color:#111; }
.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex; justify-content:space-between; align-items:center; }
.logo { height:120px; }

.file-row { display:flex; align-items:center; gap:15px; margin-bottom:10px; }

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:5px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

/* GUIDE */
.guide-modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.guide-box {
  width:900px;
  height:600px;
  background:#fff;
  border-radius:16px;
  display:flex;
}

.guide-menu {
  width:220px;
  background:#111;
  color:#fff;
  padding:20px;
}
.guide-menu div { padding:10px; cursor:pointer; }
.guide-menu div:hover { background:#333; }

.guide-content { flex:1; padding:20px; overflow:auto; }

.close-btn {
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">

<div class="file-row">
  <input type="file" id="fileInput">
  <button onclick="openGuide()">Guide</button>
</div>

<select id="software">
<option value="">Select System</option>
<option>R2</option><option>R2.5</option><option>R10</option>
<option>R50</option><option>R400</option>
<option>RX25</option><option>RC30</option>
<option>RX5</option><option>RS15</option><option>RA10</option>
</select>

<input type="date" id="onboarding">

<div id="weeklyBox" style="display:none">
<input type="date" id="weekStart">
<input type="date" id="weekEnd">
<button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="showDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<!-- GUIDE -->
<div id="guideModal" class="guide-modal">
<div class="close-btn" onclick="closeGuide()">✕</div>

<div class="guide-box">
<div class="guide-menu">
<div onclick="loadGuide('how')">How To</div>
<div onclick="loadGuide('desc')">Descriptions</div>
<div onclick="loadGuide('calc')">Calculations</div>
<div onclick="loadGuide('ai')">AI Insight</div>
</div>

<div class="guide-content">
<input type="text" id="guideSearch" placeholder="Search..." onkeyup="searchGuide()" style="width:100%;margin-bottom:10px;">
<div id="guideContent"></div>
</div>
</div>
</div>

<script>

// ===== CORE =====
let rows=[], ghlText="", lastStats={};
const fmt=v=>Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

fileInput.onchange=init;
onboarding.onchange=init;

function init(){
const file=fileInput.files[0], onboard=onboarding.value;
if(!file||!onboard) return;

const r=new FileReader();
r.onload=e=>{ rows=parseCSV(e.target.result); renderAccount(); };
r.readAsText(file);
}

function parseCSV(t){
const l=t.split("\n").filter(x=>x.trim());
const h=l[1].split(",");
return l.slice(2).map(x=>{
const v=x.split(","), o={};
h.forEach((k,i)=>o[k.trim()]=v[i]?.trim());
return o;
});
}

const sum=a=>a.reduce((s,v)=>s+v,0);
const get=c=>rows.filter(c).map(r=>+r["Net profit"]||0);

// FLOATING
function getFloatingPL(){
return sum(rows.filter(r=>r.Type==="Open position").map(r=>+r["Net profit"]||0));
}

// TOTAL CAPITAL
function getTotalCapital(onboardDate){
let o=new Date(onboardDate);
let deposits=sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>=o));
let withdrawals=sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>=o));
return deposits - Math.abs(withdrawals);
}

// BALANCE
function getBalanceAt(d){
return sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d))
- sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d))
+ sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
}

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

// ANALYZE
function analyze(start,end){
let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end);
let total=sum(trades.map(r=>+r["Net profit"]||0));
let startBal=getBalanceAt(start);
return { total, endBal:getBalanceAt(end), growth:startBal?(total/startBal)*100:0 };
}

// SYSTEM NARRATIVE
function systemNarrative(system){
if(system==="R2") return "Grid-based execution with layered recovery.";
if(system==="R2.5") return "Amplified grid strategy with higher exposure.";
if(["R10","R50","R400"].includes(system)) return "AI allocation model across strategies.";
if(system==="RS15") return "Intraday event-driven trading.";
if(system==="RA10") return "Reversal-based execution.";
return "";
}

// NARRATIVE ENGINE
function generateNarrative(start,end,type){

let d=analyze(start,end);
let system=software.value;
let positive=d.total>=0;

let tone = positive
? "The system maintained positive performance."
: "This reflects a drawdown phase under current conditions.";

let deposits=sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));
let withdrawals=sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end));

let flow="";
if(deposits>0) flow+=`Deposit: $${fmt(deposits)} `;
if(Math.abs(withdrawals)>0) flow+=`Withdrawal: $${fmt(Math.abs(withdrawals))}`;

if(type==="30"){
return `<div class="data-item">Growth: ${d.growth.toFixed(2)}% | Profit: $${fmt(d.total)}<br>${flow}<br>${systemNarrative(system)}<br>${tone}</div>`;
}

if(type==="60"){
let mid=new Date(start); mid.setDate(mid.getDate()+29);
let a=analyze(start,mid), b=analyze(mid,end);
return `<div class="data-item">60D Growth: ${d.growth.toFixed(2)}% | Profit: $${fmt(d.total)}<br>First30: $${fmt(a.total)} | Next30: $${fmt(b.total)}<br>${flow}<br>${systemNarrative(system)}<br>${tone}</div>`;
}

if(type==="90"){
return `<div class="data-item">90D Growth: ${d.growth.toFixed(2)}% | Profit: $${fmt(d.total)}<br>${flow}<br>${systemNarrative(system)}<br>${tone}</div>`;
}
}

// RUN
function run(type){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]), e=new Date(s); e.setDate(e.getDate()+(+type-1));
render(s,e,type+" Days",type);
}

function runWeekly(){
render(new Date(weekStart.value),new Date(weekEnd.value),"Weekly");
}

function showWeekly(){ weeklyBox.style.display="block"; }

function showDetailed(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]);
let e=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
render(s,e,"Detailed Review","detailed");
}

// RENDER
function render(start,end,title,type){

let d=analyze(start,end);

let html=`
<div class="section-title">${title}</div>
<div class="data-grid">
<div class="data-item">Balance: $${fmt(d.endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(d.total)}</div>
<div class="data-item">Floating P/L: $${fmt(getFloatingPL())}</div>
<div class="data-item">Growth: ${d.growth.toFixed(2)}%</div>
</div>
`;

if(type==="30"||type==="60"||type==="90"){
html+=`<div class="section-title">Summary</div>${generateNarrative(start,end,type)}`;
}

if(type==="detailed"){
html+=`<div class="section-title">Performance Summary</div>${detailedNarrative(start,end)}`;
}

breakdown.innerHTML=html;
ghlText=html.replace(/<[^>]*>/g,'');
}

// DETAILED (YOUR VERSION)
function detailedNarrative(start,end){
let d=analyze(start,end);
return `<div class="data-item">
Closed Profit: $${fmt(d.total)}<br>
Floating P/L: $${fmt(getFloatingPL())}
</div>`;
}

// OVERVIEW
function renderAccount(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let last=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
let closed=sum(get(r=>r.Type==="Closed position"));

overview.innerHTML=`
<div class="section-title">Overview</div>
<div class="data-grid">
<div class="data-item">System<br><h2>${software.value||"N/A"}</h2></div>
<div class="data-item">Balance<br><h2>$${fmt(getBalanceAt(last))}</h2></div>
<div class="data-item">Closed Profit<br><h2>$${fmt(closed)}</h2></div>
<div class="data-item">Floating P/L<br><h2>$${fmt(getFloatingPL())}</h2></div>
<div class="data-item">Total Capital<br><h2>$${fmt(getTotalCapital(onboarding.value))}</h2></div>
</div>`;
}

// COPY
function copyNote(){ navigator.clipboard.writeText(ghlText); alert("Copied for GHL"); }
function copyEmail(){ navigator.clipboard.writeText(ghlText); alert("Copied for Email"); }

// GUIDE
function openGuide(){ guideModal.style.display="flex"; }
function closeGuide(){ guideModal.style.display="none"; }

let guideData={
how:"Upload CSV → Select onboarding → Run",
desc:"Metrics explanation",
calc:"Growth = Profit / Balance"
};

function loadGuide(type){
if(type==="ai"){ guideContent.innerHTML="Run analysis first."; return; }
guideContent.innerHTML=guideData[type];
}

function searchGuide(){
let val=guideSearch.value.toLowerCase();
guideContent.style.opacity = guideContent.innerText.toLowerCase().includes(val)?1:0.3;
}

</script>

</body>
</html>
