<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Performance Checker</title>

<style>
body { font-family:-apple-system,'Segoe UI'; background:#f4f4f5; padding:50px; color:#111; }
.container { max-width:1100px;margin:auto; }

.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 20px;
  border:1px solid rgba(0,0,0,0.05);
}

.header { display:flex; justify-content:space-between; align-items:center; }
.logo { height:40px; }

.file-row { display:flex; align-items:center; gap:15px; margin-bottom:10px; }

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:5px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#333; }

.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.data-item {
  background:#fff;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
}

.section-title {
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
}

h2 { font-size:28px;margin:0; }
</style>
</head>

<body>

<div class="container">

<div class="glass header">
  <h2>Account Performance Checker</h2>
  <img src="logo.png" class="logo">
</div>

<div class="glass">

<div class="file-row">
  <input type="file" id="fileInput">
  <button onclick="openGuide()">Guide / Library</button>
</div>

<select id="software">
<option value="">Select System</option>
<option>R2</option><option>R2.5</option><option>R10</option><option>R50</option>
<option>R400</option><option>RX25</option><option>RC30</option>
<option>RX5</option><option>RS15</option><option>RA10</option>
</select>

<input type="date" id="onboarding">

<div id="customRange" style="display:none">
<input type="date" id="customStart">
<input type="date" id="customEnd">
</div>

<div id="weeklyBox" style="display:none">
<input type="date" id="weekStart">
<input type="date" id="weekEnd">
<button onclick="runWeekly()">Run Weekly</button>
</div>

<br>

<button onclick="showWeekly()">Weekly</button>
<button onclick="run('30')">30 Days</button>
<button onclick="run('60')">60 Days</button>
<button onclick="run('90')">90 Days</button>
<button onclick="showDetailed()">Detailed Review</button>
<button onclick="copyNote()">Copy GHL</button>
<button onclick="copyEmail()">Copy Email</button>

</div>

<div id="overview" class="glass"></div>
<div id="breakdown" class="glass"></div>

</div>

<script>

// ===== UI =====
function hideAllDateSelectors(){
weeklyBox.style.display="none";
customRange.style.display="none";
}
function showWeekly(){ hideAllDateSelectors(); weeklyBox.style.display="block"; }
function showDetailed(){ hideAllDateSelectors(); customRange.style.display="block"; runDetailed(); }
function openGuide(){ window.open("guide.html","_blank"); }

// ===== CORE =====
let rows=[], ghlText="", lastStats={};
const fmt=v=>Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

fileInput.onchange=init;
onboarding.onchange=init;

function init(){
const file=fileInput.files[0], onboard=onboarding.value;
if(!file||!onboard) return;

const r=new FileReader();
r.onload=e=>{ rows=parseCSV(e.target.result); renderAccount(); };
r.readAsText(file);
}

function parseCSV(t){
const l=t.split("\n").filter(x=>x.trim());
const h=l[1].split(",");
return l.slice(2).map(x=>{
const v=x.split(","), o={};
h.forEach((k,i)=>o[k.trim()]=v[i]?.trim());
return o;
});
}

const sum=a=>a.reduce((s,v)=>s+v,0);
const get=c=>rows.filter(c).map(r=>+r["Net profit"]||0);

function getFirstClose(o){
return rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=o)
.sort((a,b)=>new Date(a["Close date"])-new Date(b["Close date"]))[0];
}

function getBalanceAt(d){
return sum(get(r=>r.Type==="Deposit" && new Date(r["Close date"])<=d))
- sum(get(r=>r.Type==="Withdrawal" && new Date(r["Close date"])<=d))
+ sum(get(r=>r.Type==="Closed position" && new Date(r["Close date"])<=d));
}

function getTotalCapital(o){
let d=new Date(o);
return getBalanceAt(d)
+ sum(get(r=>r.Type==="Deposit" && +r["Net profit"]>0 && new Date(r["Close date"])>=d))
+ sum(get(r=>(r.Type==="Withdrawal" || (r.Type==="Deposit" && +r["Net profit"]<0)) && new Date(r["Close date"])>=d));
}

// ===== ANALYSIS =====
function analyze(start,end){
let trades=rows.filter(r=>r.Type==="Closed position" && new Date(r["Close date"])>=start && new Date(r["Close date"])<=end);
let total=sum(trades.map(r=>+r["Net profit"]||0));
let startBal=getBalanceAt(start);
return { total, startBal, endBal:getBalanceAt(end), growth:startBal?(total/startBal)*100:0 };
}

// ===== NARRATIVES =====
function narrative(start,end,type){
let d=analyze(start,end);

if(type==="30"){
return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over 30 days, generating $${fmt(d.total)} in closed profit.
Performance reflects early execution and remains dependent on market conditions.
</div>`;
}

if(type==="60"){
let mid=new Date(start); mid.setDate(mid.getDate()+29);
let a=analyze(start,mid), b=analyze(mid,end);
return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over 60 days, generating $${fmt(d.total)} in closed profit.

The first 30 days produced $${fmt(a.total)}, while the next 30 days produced $${fmt(b.total)}, showing how performance evolved.

Performance remains dependent on market conditions.
</div>`;
}

if(type==="90"){
return `<div class="data-item">
The account recorded a growth of ${d.growth.toFixed(2)}% over 90 days, generating $${fmt(d.total)} in closed profit.

This reflects broader system behavior across different market conditions.

Performance remains dependent on market conditions.
</div>`;
}
}

// ===== DETAILED =====
function detailedNarrative(start,end){
let d=analyze(start,end);
let balances=[];

rows.forEach(r=>{
if(r.Type==="Closed position"){
let dt=new Date(r["Close date"]);
if(dt>=start&&dt<=end) balances.push({dt,b:getBalanceAt(dt)});
}
});

if(!balances.length) return "";

let init=balances[0].b;
let low=Math.min(...balances.map(x=>x.b));
let lowObj=balances.find(x=>x.b===low);
let final=balances.at(-1).b;

return `<div class="data-item">
The account started at $${fmt(init)} on ${balances[0].dt.toLocaleDateString()}.

It dropped to $${fmt(low)} on ${lowObj.dt.toLocaleDateString()} (${((low-init)/init*100).toFixed(2)}%).

${low<init?"The account went below initial capital.":"The account stayed above initial capital."}

${final>init?`Recovered to $${fmt(final)} (${((final-init)/init*100).toFixed(2)}%).`:`Currently at $${fmt(final)}.`}

Total closed profit: $${fmt(d.total)}.
</div>`;
}

// ===== RUN =====
function run(type){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=new Date(f["Close date"]), e=new Date(s); e.setDate(e.getDate()+(+type-1));
render(s,e,type+" Days",type);
}

function runWeekly(){
render(new Date(weekStart.value),new Date(weekEnd.value),"Weekly");
}

function runDetailed(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;
let s=customStart.value?new Date(customStart.value):new Date(f["Close date"]);
let e=customEnd.value?new Date(customEnd.value):new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));
render(s,e,"Detailed Review","detailed");
}

// ===== RENDER =====
function render(start,end,title,type){
let d=analyze(start,end);
let html=`<div class="section-title">${title}</div>
<div class="data-grid">
<div class="data-item">Balance: $${fmt(d.endBal)}</div>
<div class="data-item">Closed Profit: $${fmt(d.total)}</div>
<div class="data-item">Growth: ${d.growth.toFixed(2)}%</div>
</div>`;

if(["30","60","90"].includes(type)){
html+=`<div class="section-title">Performance Summary</div>${narrative(start,end,type)}`;
}
if(type==="detailed"){
html+=`<div class="section-title">Performance Summary</div>${detailedNarrative(start,end)}`;
}

breakdown.innerHTML=html;
ghlText=html.replace(/<[^>]*>/g,'');
}

// ===== OVERVIEW =====
function renderAccount(){
let f=getFirstClose(new Date(onboarding.value)); if(!f) return;

let fc=new Date(f["Close date"]);
let last=new Date(Math.max(...rows.map(r=>new Date(r["Close date"]))));

let closed=sum(get(r=>r.Type==="Closed position"));
let startBal=getBalanceAt(fc);
let growth=startBal?(closed/startBal)*100:0;

overview.innerHTML=`
<div class="section-title">Overview</div>
<div class="data-grid">
<div class="data-item">Balance<br><h2>$${fmt(getBalanceAt(last))}</h2></div>
<div class="data-item">Growth<br><h2>${growth.toFixed(2)}%</h2></div>
<div class="data-item">Closed Profit<br><h2>$${fmt(closed)}</h2></div>
<div class="data-item">Total Capital<br><h2>$${fmt(getTotalCapital(onboarding.value))}</h2></div>
</div>`;
}

// ===== COPY =====
function copyNote(){ navigator.clipboard.writeText(ghlText); alert("Copied"); }
function copyEmail(){ navigator.clipboard.writeText(ghlText); alert("Copied"); }

</script>

</body>
</html>
