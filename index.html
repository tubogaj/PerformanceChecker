<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance Checker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #ffffff;
    color: #000;
    padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

h1 { text-align: center; }

.card {
    background: #fff;
    border: 3px solid #000;
    padding: 20px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 2px solid #000;
}

button {
    width: 100%;
    padding: 12px;
    background: #000;
    color: #fff;
    border: 2px solid #000;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #333; }

canvas {
    background: #fff;
    border: 3px solid #000;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 2px solid #000;
    padding: 8px;
    text-align: center;
}

th {
    background: #000;
    color: #fff;
}
</style>
</head>

<body>

<div class="container">

<h1>Conan - Account Performance Checker</h1>

<div class="card">
<input id="name" placeholder="Client Name">
<input id="software" placeholder="Software (R-10, R-50, R-X5, R-S15, R-A10)">
<input type="file" id="file" accept=".csv">
</div>

<div class="card">
<button onclick="analyze()">Generate Analysis</button>
</div>

<div class="card" id="result"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Monthly Breakdown</h3>
<table id="monthlyTable">
<thead>
<tr>
<th>Month</th>
<th>Trades</th>
<th>Net Profit</th>
<th>Win Rate</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

let trades=[], equity=[], deposit=0, withdrawals=0;

// CSV LOAD
document.getElementById('file').addEventListener('change', e=>{
    let reader=new FileReader();
    reader.onload=e=>{
        let rows=e.target.result.split("\n").map(r=>r.split(","));
        let headers=rows[0].map(h=>h.trim());
        processCSV(headers, rows.slice(1));
    };
    reader.readAsText(e.target.files[0]);
});

// PROCESS
function processCSV(headers, rows){

    trades=[]; equity=[]; deposit=0; withdrawals=0;
    let bal=0;

    let t=headers.indexOf("Type");
    let p=headers.indexOf("Net Profit");
    let c=headers.indexOf("Close Time");

    rows.forEach(r=>{
        let type=(r[t]||"").toLowerCase();
        let profit=parseFloat(r[p])||0;

        if(type.includes("deposit")){deposit+=profit; bal+=profit;}
        else if(type.includes("withdrawal")){withdrawals+=Math.abs(profit); bal+=profit;}
        else if(r[c]){
            bal+=profit;
            let d=new Date(r[c]);

            trades.push({date:d, profit:profit});
            equity.push({date:d, balance:bal});
        }
    });

    alert("CSV Loaded");
}

// METRICS
function metrics(){

    let total=trades.reduce((a,b)=>a+b.profit,0);
    let wins=trades.filter(t=>t.profit>0);
    let losses=trades.filter(t=>t.profit<0);

    let winRate=(wins.length/trades.length*100)||0;
    let avgWin=wins.length?wins.reduce((a,b)=>a+b.profit,0)/wins.length:0;
    let avgLoss=losses.length?losses.reduce((a,b)=>a+b.profit,0)/losses.length:0;

    let peak=0,maxDD=0;

    equity.forEach(p=>{
        if(p.balance>peak) peak=p.balance;
        let dd=(peak-p.balance)/peak*100;
        if(dd>maxDD) maxDD=dd;
    });

    return {
        total:total.toFixed(2),
        winRate:winRate.toFixed(2),
        avgWin:avgWin.toFixed(2),
        avgLoss:avgLoss.toFixed(2),
        maxDD:maxDD.toFixed(2)
    };
}

// MONTHLY TABLE
function buildMonthlyTable(){

    let map={};

    trades.forEach(t=>{
        let key=t.date.getFullYear()+"-"+(t.date.getMonth()+1);

        if(!map[key]){
            map[key]={profit:0,trades:0,wins:0};
        }

        map[key].profit+=t.profit;
        map[key].trades++;
        if(t.profit>0) map[key].wins++;
    });

    let tbody=document.querySelector("#monthlyTable tbody");
    tbody.innerHTML="";

    Object.keys(map).sort().forEach(m=>{
        let data=map[m];
        let winRate=(data.wins/data.trades*100)||0;

        let row=`
        <tr>
        <td>${m}</td>
        <td>${data.trades}</td>
        <td>$${data.profit.toFixed(2)}</td>
        <td>${winRate.toFixed(2)}%</td>
        </tr>
        `;
        tbody.innerHTML+=row;
    });
}

// STRATEGY
function behavior(s){
    s=s.toUpperCase();

    if(s.includes("R-X5")) return "Low-risk system, gradual growth.";
    if(s.includes("R-X25")) return "Structured compounding system.";
    if(s.includes("R-C30")) return "High volatility crypto behavior.";
    if(s.includes("R-50")) return "Diversified multi-strategy.";
    if(s.includes("R-10")) return "High-frequency execution.";
    if(s.includes("R-S15")) return "Intraday news-driven spikes.";
    if(s.includes("R-A10")) return "Reversal system with low drawdown.";

    return "Adaptive system.";
}

// AM REPORT
function report(software,m){

    return `
--- PERFORMANCE ---
${m.total>0?"Profitable":"Drawdown phase"}

--- RISK ---
${m.maxDD>20?"High risk":"Moderate/Controlled risk"}

--- EXECUTION ---
Win Rate: ${m.winRate}%

--- RISK/REWARD ---
${parseFloat(m.avgWin)>Math.abs(parseFloat(m.avgLoss))?"Positive RR":"Negative RR"}

--- STRATEGY ---
${behavior(software)}
`;
}

// CHART
function chart(){

    new Chart(document.getElementById('chart'),{
        type:'line',
        data:{
            labels:equity.map(e=>e.date.toLocaleDateString()),
            datasets:[{
                label:'Equity',
                data:equity.map(e=>e.balance),
                borderWidth:2
            }]
        }
    });
}

// MAIN
function analyze(){

    let name=document.getElementById("name").value;
    let software=document.getElementById("software").value;

    let m=metrics();

    document.getElementById("result").innerText=`
Client: ${name}
Software: ${software}

--- METRICS ---
Total Net Profit: $${m.total}
Win Rate: ${m.winRate}%
Avg Win: $${m.avgWin}
Avg Loss: $${m.avgLoss}
Max Drawdown: ${m.maxDD}%

${report(software,m)}
`;

    chart();
    buildMonthlyTable();
}

</script>

</body>
</html>
