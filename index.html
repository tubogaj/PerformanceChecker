<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conan - Account Performance Checker</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    width: 220px;
    opacity: 0.9;
}

/* WATERMARK */
body::before {
    content: "";
    background: url('logo.png') no-repeat center;
    background-size: 500px;
    opacity: 0.03;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
}

.card {
    background: rgba(30, 41, 59, 0.9);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(10px);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: #fff;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
}

button:hover {
    box-shadow: 0 0 15px #3b82f6;
}

canvas {
    background: #fff;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="logo.png" alt="Company Logo">
</div>

<h1>Conan - Account Performance Checker</h1>

<div class="card">
<input id="name" placeholder="Client Name">
<input id="software" placeholder="Software (R-10, R-50, R-X5, etc)">
<input type="date" id="onboarding">

<label>Tone:</label>
<select id="tone">
<option value="conservative">Conservative</option>
<option value="confident">Confident</option>
<option value="technical">Technical</option>
</select>

<input type="file" id="file">
</div>

<div class="card">
<button onclick="analyze()">Generate Report</button>
</div>

<div class="card" id="result"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>

// DATA
let trades=[], equity=[], deposit=0, withdrawals=0;

// LOAD EXCEL
document.getElementById('file').addEventListener('change', e=>{
    let reader=new FileReader();
    reader.onload=e=>{
        let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        let json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        process(json);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

function process(data){
    trades=[]; equity=[]; deposit=0; withdrawals=0;
    let bal=0;

    data.forEach(r=>{
        let type=(r.Type||"").toLowerCase();
        let p=parseFloat(r.Profit||0);

        if(type.includes("deposit")){deposit+=p; bal+=p;}
        else if(type.includes("withdrawal")){withdrawals+=Math.abs(p); bal+=p;}
        else if(r["Close Time"]){
            bal+=p;
            trades.push({date:new Date(r["Close Time"]), profit:p});
            equity.push({date:new Date(r["Close Time"]), balance:bal});
        }
    });

    alert("Excel Loaded ✅");
}

// METRICS
function metrics(){
    let total=trades.reduce((a,b)=>a+b.profit,0);
    let wins=trades.filter(t=>t.profit>0);
    let losses=trades.filter(t=>t.profit<0);

    let winRate=(wins.length/trades.length*100)||0;
    let avgWin=wins.length?wins.reduce((a,b)=>a+b.profit,0)/wins.length:0;
    let avgLoss=losses.length?losses.reduce((a,b)=>a+b.profit,0)/losses.length:0;

    let peak=0, maxDD=0;
    equity.forEach(p=>{
        if(p.balance>peak) peak=p.balance;
        let dd=(peak-p.balance)/peak*100;
        if(dd>maxDD) maxDD=dd;
    });

    return {
        total:total.toFixed(2),
        winRate:winRate.toFixed(2),
        avgWin:avgWin.toFixed(2),
        avgLoss:avgLoss.toFixed(2),
        maxDD:maxDD.toFixed(2)
    };
}

// STRATEGY
function strategyText(s){
    s=s.toUpperCase();
    if(s.includes("R-X5")) return "a conservative system focused on capital preservation and gradual growth.";
    if(s.includes("R-X25")) return "a structured compounding system with steady growth.";
    if(s.includes("R-C30")) return "a high-volatility crypto trading system.";
    if(s.includes("R-50")) return "a diversified multi-strategy allocation system.";
    if(s.includes("R-10")) return "a high-frequency statistical execution system.";
    return "an adaptive trading system.";
}

// GPT REPORT WITH TONE
function gptReport(name, software, m, tone){

    let intro={
        conservative:`Hi ${name}, here’s a balanced update on your account.`,
        confident:`Hi ${name}, great to share your latest performance.`,
        technical:`Performance summary for ${name}'s account:`
    };

    let body={
        conservative:`The account is progressing steadily with drawdown at ${m.maxDD}% and a win rate of ${m.winRate}%.`,
        confident:`Strong performance with ${m.winRate}% win rate and controlled drawdown at ${m.maxDD}%.`,
        technical:`Win rate: ${m.winRate}%, Avg Win: ${m.avgWin}, Avg Loss: ${m.avgLoss}, Max DD: ${m.maxDD}%.`
    };

    let closing={
        conservative:"Focus remains on long-term stability.",
        confident:"We expect continued strong performance.",
        technical:"System operating within expected parameters."
    };

    return `
${intro[tone]}

${body[tone]}

The system operates as ${strategyText(software)}

${closing[tone]}
`;
}

// CHART
function drawChart(){
    let ctx=document.getElementById('chart');
    new Chart(ctx,{
        type:'line',
        data:{
            labels:equity.map(e=>e.date.toLocaleDateString()),
            datasets:[{
                label:'Equity Curve',
                data:equity.map(e=>e.balance),
                borderWidth:2
            }]
        }
    });
}

// MAIN
function analyze(){

    let name=document.getElementById("name").value;
    let software=document.getElementById("software").value;
    let tone=document.getElementById("tone").value;

    let m=metrics();

    let output=`
Client: ${name}
Software: ${software}

--- PERFORMANCE SUMMARY ---
Total Profit: $${m.total}
Win Rate: ${m.winRate}%
Avg Win: $${m.avgWin}
Avg Loss: $${m.avgLoss}
Max Drawdown: ${m.maxDD}%

--- ACCOUNT MANAGER REPORT ---
${gptReport(name, software, m, tone)}
`;

    document.getElementById("result").innerText=output;

    drawChart();
}

</script>

</body>
</html>
